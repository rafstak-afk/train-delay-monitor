<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Monitor opóźnień PLK</title>

<style>

body{
  font-family: Arial,sans-serif;
  margin:20px;
  background:#f4f4f4;
  color:#222;
}

h1{
  margin-bottom:10px;
}

.panel{
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

input,button{
  padding:10px;
  font-size:16px;
}

button{
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  font-size:14px;
}

th{
  background:#222;
  color:white;
}

.delay{
  color:#c62828;
  font-weight:bold;
}

.ok{
  color:#2e7d32;
}

pre{
  white-space:pre-wrap;
  font-size:12px;
  background:#111;
  color:#0f0;
  padding:12px;
  overflow:auto;
  border-radius:8px;
}

</style>
</head>
<body>

<h1>Monitor opóźnień PLK</h1>

<div class="panel">

<input
  id="station"
  placeholder="Np. Tczew"
  value="Tczew"
/>

<button onclick="loadData()">
Pobierz
</button>

</div>

<div class="panel">

<div id="summary"></div>

</div>

<table>

<thead>
<tr>
<th>STACJA</th>
<th>PLAN</th>
<th>RZECZ.</th>
<th>OPÓŹ.</th>
<th>STATUS</th>
<th>POCIĄG</th>
<th>KIERUNEK</th>
<th>PRZEWOŹNIK</th>
<th>PERON</th>
<th>PRZEZ</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<h2>Debug</h2>

<pre id="debug"></pre>

<script>

async function loadData() {

  const station =
    document.getElementById("station").value;

  const response = await fetch("/train", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      station
    })
  });

  const data = await response.json();

  console.log(data);

  document.getElementById("debug")
    .textContent =
      JSON.stringify(
        data.debug,
        null,
        2
      );

  if (!data.route) {
    alert("Błąd API");
    return;
  }

  document.getElementById("summary")
    .innerHTML = `
      <b>Stacja:</b> ${data.matchedStation}
      <br>
      <b>ID:</b> ${data.matchedStationId}
      <br>
      <b>Odjazdy:</b> ${data.totalDepartures}
    `;

  const tbody =
    document.getElementById("tbody");

  tbody.innerHTML = "";

  for (const row of data.route) {

    const tr =
      document.createElement("tr");

    tr.innerHTML = `
      <td>${row.station}</td>
      <td>${row.scheduled}</td>
      <td>${row.actual}</td>
      <td class="${
        row.delayMinutes > 0
        ? 'delay'
        : 'ok'
      }">
        ${row.delayMinutes} min
      </td>
      <td>${row.status}</td>
      <td>${row.trainNumber}</td>
      <td>${row.destination}</td>
      <td>${row.carrier}</td>
      <td>${row.platform}</td>
      <td>${row.via}</td>
    `;

    tbody.appendChild(tr);
  }
}

loadData();

</script>

</body>
</html>

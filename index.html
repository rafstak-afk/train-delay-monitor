<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Tablica Odjazdów PLK</title>

  <style>

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#101820;
      color:#fff;
      padding:20px;
    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    h1{
      text-align:center;
      margin-bottom:24px;
      font-size:32px;
    }

    .station-buttons,
    .secondary-buttons{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-bottom:14px;
    }

    .btn{
      background:#0b57d0;
      color:white;
      text-decoration:none;
      padding:12px 18px;
      border-radius:8px;
      font-weight:600;
      transition:0.2s;
      border:none;
      cursor:pointer;
      display:inline-block;
    }

    .btn:hover{
      background:#084298;
      transform:translateY(-1px);
    }

    .search-box{
      margin:24px auto;
      max-width:600px;
      display:flex;
      gap:10px;
    }

    .search-box input{
      flex:1;
      padding:14px;
      border:none;
      border-radius:8px;
      font-size:16px;
    }

    .search-box button{
      padding:14px 18px;
      border:none;
      border-radius:8px;
      background:#198754;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .search-box button:hover{
      background:#157347;
    }

    .table-wrapper{
      margin-top:30px;
      overflow-x:auto;
      border-radius:12px;
      overflow:hidden;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:#1c2833;
    }

    thead{
      background:#243447;
    }

    th{
      padding:16px;
      text-align:left;
    }

    td{
      padding:16px;
      border-top:1px solid #2f4054;
    }

    tr:hover{
      background:#253445;
    }

    .delay{
      color:#ffcc00;
      font-weight:bold;
    }

    .on-time{
      color:#5dd39e;
      font-weight:bold;
    }

    .footer{
      text-align:center;
      margin-top:30px;
      opacity:0.7;
      font-size:14px;
    }

    @media(max-width:768px){

      h1{
        font-size:24px;
      }

      .search-box{
        flex-direction:column;
      }

      .search-box button{
        width:100%;
      }

      th,td{
        font-size:13px;
        padding:12px;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <h1>🚆 Tablica Odjazdów PLK</h1>

  <!-- PRZYCISKI STACJI -->

  <div class="station-buttons">

    <button class="btn" onclick="loadStation('Katowice')">
      Katowice
    </button>

    <button class="btn" onclick="loadStation('Chorzów Batory')">
      Chorzów Batory
    </button>

    <button class="btn" onclick="loadStation('Bytom')">
      Bytom
    </button>

    <button class="btn" onclick="loadStation('Gliwice')">
      Gliwice
    </button>

    <button class="btn" onclick="loadStation('Zabrze')">
      Zabrze
    </button>

    <a class="btn"
       href="https://portalpasazera.pl"
       target="_blank">
      Portal Pasażera
    </a>

    <a class="btn"
       href="/debug.html">
      Debug
    </a>

  </div>

  <!-- DRUGI RZĄD -->

  <div class="secondary-buttons">

    <a class="btn"
       href="https://l.plk-sa.pl/#qr-generator"
       target="_blank">
      Generator QR PLK
    </a>

  </div>

  <!-- WYSZUKIWARKA -->

  <div class="search-box">

    <input
      type="text"
      id="stationInput"
      placeholder="Wpisz nazwę stacji..."
    />

    <button onclick="loadDepartures()">
      Szukaj
    </button>

  </div>

  <!-- TABLICA -->

  <div class="table-wrapper">

    <table>

      <thead>
        <tr>
          <th>Godzina</th>
          <th>Pociąg</th>
          <th>Kierunek</th>
          <th>Peron</th>
          <th>Opóźnienie</th>
        </tr>
      </thead>

      <tbody id="departuresBody">

        <tr>
          <td>--:--</td>
          <td colspan="4">
            Wybierz stację lub wyszukaj własną.
          </td>
        </tr>

      </tbody>

    </table>

  </div>

  <div class="footer">
    Dane realtime PLK / Portal Pasażera
  </div>

</div>

<script>

  async function loadDepartures() {

    const station =
      document.getElementById("stationInput")
      .value
      .trim();

    if (!station) {
      alert("Wpisz nazwę stacji.");
      return;
    }

    loadStation(station);
  }

  async function loadStation(station) {

    try {

      const response = await fetch(
        `/resolve-link?station=${encodeURIComponent(station)}`
      );

      if (!response.ok) {
        throw new Error("Błąd resolvera linku.");
      }

      const data = await response.json();

      if (!data.url) {
        throw new Error("Brak URL w odpowiedzi.");
      }

      window.open(data.url, "_blank");

    } catch (error) {

      console.error(error);

      alert(
        "Nie udało się otworzyć tablicy dla stacji: "
        + station
      );
    }
  }

</script>

</body>
</html>

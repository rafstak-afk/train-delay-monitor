<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Monitor odjazdów PLK</title>

<style>

body{
  font-family:Arial,sans-serif;
  margin:8px;
  background:#f5f5f5;
}

h1{
  font-size:22px;
}

.panel{
  background:white;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

input,button{

  width:100%;
  box-sizing:border-box;
  padding:12px;
  font-size:16px;

}

button{
  border:none;
  background:#0b57d0;
  color:white;
  border-radius:8px;
}

.card{

  background:white;
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;

}

.row{
  margin-bottom:4px;
}

.label{
  font-weight:bold;
}

.delay{
  color:red;
  font-weight:bold;
}

.ok{
  color:green;
  font-weight:bold;
}

</style>

</head>

<body>

<h1>Monitor odjazdów PLK</h1>

<div class="panel">

<div class="grid">

<input
  id="station"
  list="stationsHistory"
  placeholder="Stacja"
/>

<datalist id="stationsHistory"></datalist>

<input
  id="date"
  type="date"
/>

<input
  id="time"
  type="time"
/>

<button id="loadBtn">
Pobierz
</button>

</div>

</div>

<div
  class="panel"
  id="summary"
>
Brak danych
</div>

<div id="results"></div>

<script>

const now =
  new Date();

document
  .getElementById("date")
  .value =
    now.toISOString()
      .split("T")[0];

document
  .getElementById("time")
  .value =
    now.toTimeString()
      .slice(0,5);

const stationInput =
  document.getElementById(
    "station"
  );

stationInput.value =
  localStorage.getItem(
    "lastStation"
  )
  || "Tarnowskie Góry";

renderHistory();

async function loadData(){

  const station =
    stationInput.value.trim();

  if(!station){
    return;
  }

  saveStation(station);

  const response =
    await fetch("/train",{

      method:"POST",

      headers:{
        "Content-Type":
          "application/json"
      },

      body:JSON.stringify({

        station,

        date:
          document
            .getElementById("date")
            .value,

        time:
          document
            .getElementById("time")
            .value

      })

    });

  const data =
    await response.json();

  if(!data.ok){

    alert(
      data.error
      || "Błąd API"
    );

    return;

  }

  document
    .getElementById("summary")
    .innerHTML = `

<b>${data.matchedStation}</b>
<br>
Odjazdów:
${data.totalDepartures}
<br><br>

<a
 href="https://l.plk-sa.pl/${data.portalStationId}"
 target="_blank"
>
Oficjalna tablica PLK
</a>

`;

  const results =
    document.getElementById(
      "results"
    );

  results.innerHTML = "";

  for(const row of data.route){

    const card =
      document.createElement(
        "div"
      );

    card.className =
      "card";

    card.innerHTML = `

<div class="row">
<span class="label">
PLAN:
</span>
${safe(row.scheduled)}
</div>

<div class="row">
<span class="label">
RZECZ:
</span>
${safe(row.actual)}
</div>

<div class="row">
<span class="label">
OPÓŹ:
</span>

<span class="${
  row.delayMinutes > 0
  ? "delay"
  : "ok"
}">
${safe(row.delayMinutes)} min
</span>

</div>

<div class="row">
<span class="label">
POCIĄG:
</span>
${safe(row.trainNumber)}
</div>

<div class="row">
<span class="label">
KIERUNEK:
</span>
${safe(row.destination)}
</div>

<div class="row">
<span class="label">
PRZEWOŹNIK:
</span>
${safe(row.carrier)}
</div>

<div class="row">
<span class="label">
PERON:
</span>
${safe(row.platform)}
</div>

<div class="row">
<span class="label">
PRZEZ:
</span>
${safe(row.via)}
</div>

`;

    results.appendChild(card);

  }

}

function safe(value){

  if(
    value === null
    || value === undefined
    || value === ""
  ){
    return "—";
  }

  return value;

}

function saveStation(station){

  localStorage.setItem(
    "lastStation",
    station
  );

  let history =
    JSON.parse(
      localStorage.getItem(
        "stationHistory"
      )
      || "[]"
    );

  history =
    history.filter(
      s => s !== station
    );

  history.unshift(station);

  history =
    history.slice(0,20);

  localStorage.setItem(
    "stationHistory",
    JSON.stringify(history)
  );

  renderHistory();

}

function renderHistory(){

  const history =
    JSON.parse(
      localStorage.getItem(
        "stationHistory"
      )
      || "[]"
    );

  const datalist =
    document.getElementById(
      "stationsHistory"
    );

  datalist.innerHTML = "";

  for(const station of history){

    const option =
      document.createElement(
        "option"
      );

    option.value =
      station;

    datalist.appendChild(option);

  }

}

document
  .getElementById("loadBtn")
  .addEventListener(
    "click",
    loadData
  );

stationInput
  .addEventListener(
    "keydown",
    e => {

      if(e.key === "Enter"){
        loadData();
      }

    }
  );

stationInput
  .addEventListener(
    "change",
    loadData
  );

loadData();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tablica odjazdów PLK</title>

  <style>

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#101820;
      color:white;
      padding:24px;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
      text-align:center;
    }

    h1{
      margin-bottom:24px;
    }

    .station-buttons{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:18px;
    }

    .btn{
      border:0;
      border-radius:10px;
      padding:12px 18px;
      background:#0b57d0;
      color:white;
      font-weight:700;
      text-decoration:none;
      cursor:pointer;
      font-size:15px;
      transition:0.2s;
    }

    .btn:hover{
      background:#084298;
    }

    .secondary-row{
      margin-top:8px;
      margin-bottom:28px;
    }

    .btn-small{
      display:inline-block;
      padding:6px 10px;
      font-size:12px;
      border-radius:7px;
      background:#4b5563;
      color:white;
      text-decoration:none;
      opacity:0.8;
      transition:0.2s;
    }

    .btn-small:hover{
      opacity:1;
      background:#374151;
    }

    .search-box{
      margin:26px auto;
      display:flex;
      gap:10px;
      max-width:620px;
    }

    .search-box input{
      flex:1;
      padding:14px;
      border-radius:10px;
      border:0;
      font-size:16px;
    }

    .search-box button{
      padding:14px 18px;
      border-radius:10px;
      border:0;
      background:#198754;
      color:white;
      font-weight:700;
      cursor:pointer;
    }

    .search-box button:hover{
      background:#157347;
    }

    .status{
      margin-top:18px;
      min-height:24px;
      opacity:0.9;
    }

    @media(max-width:700px){

      .search-box{
        flex-direction:column;
      }

      body{
        padding:14px;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <h1>🚆 Tablica odjazdów PLK</h1>

  <!-- GŁÓWNE PRZYCISKI -->

  <div class="station-buttons">

    <button class="btn"
            onclick="openStation('Tarnowskie Góry')">
      Tarnowskie Góry
    </button>

    <button class="btn"
            onclick="openStation('Chorzów Batory')">
      Chorzów Batory
    </button>

    <button class="btn"
            onclick="openStation('Katowice')">
      Katowice
    </button>

    <button class="btn"
            onclick="openStation('Bytom')">
      Bytom
    </button>

    <button class="btn"
            onclick="openStation('Gliwice')">
      Gliwice
    </button>

    <button class="btn"
            onclick="openStation('Kraków Główny')">
      Kraków Główny
    </button>

  </div>

  <!-- DRUGI RZĄD -->

  <div class="secondary-row">

    <a class="btn-small"
       href="https://l.plk-sa.pl/#qr-generator"
       target="_blank"
       rel="noopener">
      Generator QR PLK
    </a>

  </div>

  <!-- WYSZUKIWARKA -->

  <div class="search-box">

    <input
      id="stationInput"
      type="text"
      placeholder="Wpisz nazwę stacji..."
      onkeydown="if(event.key === 'Enter') searchStation()"
    />

    <button onclick="searchStation()">
      Szukaj
    </button>

  </div>

  <div id="status" class="status">
    Wybierz stację albo wpisz nazwę.
  </div>

</div>

<script>

  function setStatus(text){
    document.getElementById("status").textContent = text;
  }

  function searchStation(){

    const station =
      document.getElementById("stationInput")
      .value
      .trim();

    if(!station){
      setStatus("Wpisz nazwę stacji.");
      return;
    }

    openStation(station);
  }

  async function openStation(station){

    setStatus("Otwieram tablicę dla stacji: " + station + "...");

    try{

      const response = await fetch(
        "/resolve-link?station=" +
        encodeURIComponent(station)
      );

      const text = await response.text();

      const link = extractLink(text);

      if(!link){
        throw new Error("Brak linku w odpowiedzi resolvera.");
      }

      window.location.href = link;

    }catch(error){

      console.error(error);

      setStatus(
        "Nie udało się otworzyć tablicy dla stacji: " +
        station
      );
    }
  }

  function extractLink(text){

    const trimmed = text.trim();

    if(
      trimmed.startsWith("http://") ||
      trimmed.startsWith("https://")
    ){
      return trimmed;
    }

    try{

      const json = JSON.parse(trimmed);

      return (
        json.url ||
        json.link ||
        json.href ||
        json.redirectUrl ||
        json.target ||
        json.result ||
        null
      );

    }catch(_){
      // JSON postanowił być JSON-em opcjonalnym
    }

    const match =
      trimmed.match(/https?:\/\/[^\s"'<>]+/);

    return match ? match[0] : null;
  }

</script>

</body>
</html>

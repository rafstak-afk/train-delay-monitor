<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Train Delay Monitor</title>
  <style>
    :root {
      --bg:#f7f6f2; --surface:#fbfbf9; --surface2:#f3f0ec; --text:#28251d; --muted:#6f6d68;
      --border:rgba(40,37,29,.12); --primary:#01696f; --primary2:#0c4e54; --danger:#a13544; --warn:#da7101;
      --ok:#437a22; --shadow:0 10px 30px rgba(30,30,20,.08); --radius:16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#171614; --surface:#1c1b19; --surface2:#22211f; --text:#e4e1da; --muted:#9b988f;
        --border:rgba(228,225,218,.12); --primary:#4f98a3; --primary2:#227f8b; --danger:#dd6974; --warn:#fdab43;
        --ok:#6daa45; --shadow:0 12px 32px rgba(0,0,0,.35);
      }
    }
    * { box-sizing:border-box; }
    body {
      margin:0; font:16px/1.5 Inter, ui-sans-serif, system-ui, sans-serif; color:var(--text);
      background:linear-gradient(180deg,var(--bg),var(--surface2)); min-height:100vh;
    }
    .wrap { max-width:1100px; margin:0 auto; padding:24px; }
    .header { display:flex; justify-content:space-between; gap:16px; align-items:center; margin-bottom:20px; }
    .brand { display:flex; gap:12px; align-items:center; }
    .logo { width:42px; height:42px; border-radius:12px; background:var(--primary); color:white; display:grid; place-items:center; box-shadow:var(--shadow); }
    h1 { font-size:clamp(26px,4vw,40px); line-height:1.08; margin:0; }
    .subtitle { color:var(--muted); margin-top:4px; }
    .grid { display:grid; grid-template-columns:1.1fr .9fr; gap:20px; }
    .card {
      background:color-mix(in srgb, var(--surface) 88%, transparent); border:1px solid var(--border);
      border-radius:var(--radius); box-shadow:var(--shadow); padding:18px;
      backdrop-filter: blur(8px);
    }
    .form-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field.full { grid-column:1 / -1; }
    label { font-size:13px; color:var(--muted); font-weight:600; }
    input, select, textarea {
      width:100%; border:1px solid var(--border); background:var(--surface); color:var(--text);
      border-radius:12px; padding:12px 14px; outline:none;
    }
    textarea { min-height:140px; resize:vertical; }
    input:focus, select:focus, textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px color-mix(in srgb, var(--primary) 18%, transparent); }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
    button {
      border:0; border-radius:12px; padding:12px 16px; font-weight:700; cursor:pointer;
      background:var(--primary); color:white;
    }
    button.secondary { background:transparent; color:var(--text); border:1px solid var(--border); }
    button:hover { background:var(--primary2); }
    button.secondary:hover { background:var(--surface2); }
    .hint, .status { color:var(--muted); font-size:14px; }
    .status.error { color:var(--danger); }
    .status.ok { color:var(--ok); }
    .stats { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-bottom:16px; }
    .stat { padding:14px; border-radius:14px; background:var(--surface2); border:1px solid var(--border); }
    .stat .k { font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
    .stat .v { font-size:clamp(24px,5vw,36px); font-weight:800; margin-top:6px; }
    .pill { display:inline-flex; align-items:center; gap:8px; border-radius:999px; padding:8px 12px; font-weight:700; }
    .pill.ok { background:color-mix(in srgb, var(--ok) 15%, transparent); color:var(--ok); }
    .pill.warn { background:color-mix(in srgb, var(--warn) 15%, transparent); color:var(--warn); }
    .pill.danger { background:color-mix(in srgb, var(--danger) 15%, transparent); color:var(--danger); }
    table { width:100%; border-collapse:collapse; margin-top:14px; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid var(--border); vertical-align:top; }
    th { font-size:13px; color:var(--muted); }
    .mono { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
    .muted { color:var(--muted); }
    .hidden { display:none; }
    @media (max-width: 860px) {
      .grid, .form-grid, .stats { grid-template-columns:1fr; }
      .wrap { padding:16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-label="logo"><path d="M4 15h11l3-3h2"/><path d="M7 15V9h7l3 3"/><circle cx="8" cy="18" r="1.5"/><circle cx="17" cy="18" r="1.5"/></svg>
        </div>
        <div>
          <h1>Train Delay Monitor</h1>
          <div class="subtitle">Prosta lokalna apka do sprawdzania opóźnień pociągu przez API PLK.</div>
        </div>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Konfiguracja</h2>
        <p class="hint">Wpisz parametry API. Klucz działa tylko w tej sesji przeglądarki.</p>
        <div class="form-grid">
          <div class="field full">
            <label for="apiUrl">Endpoint API</label>
            <input id="apiUrl" placeholder="https://twoj-worker.example.workers.dev/api/train" />
          </div>
          <div class="field">
            <label for="authType">Typ autoryzacji</label>
            <select id="authType">
              <option value="bearer">Bearer</option>
              <option value="x-api-key">X-API-Key</option>
              <option value="custom-header">Custom header</option>
              <option value="none">Brak</option>
            </select>
          </div>
          <div class="field">
            <label for="customHeader">Niestandardowy nagłówek</label>
            <input id="customHeader" placeholder="X-PLK-API-KEY" />
          </div>
          <div class="field full">
            <label for="apiKey">API key</label>
            <input id="apiKey" type="password" placeholder="Wklej klucz API" />
          </div>
          <div class="field">
            <label for="trainNumber">Numer pociągu</label>
            <input id="trainNumber" value="3814" />
          </div>
          <div class="field">
            <label for="trainDate">Data kursu</label>
            <input id="trainDate" type="date" />
          </div>
          <div class="field full">
            <label for="extraBody">Dodatkowe pola JSON do body</label>
            <textarea id="extraBody" placeholder='{"carrier":"IC"}'></textarea>
          </div>
          <div class="field full">
            <label for="rawJson">Tryb demo / ręczne wklejenie JSON</label>
            <textarea id="rawJson" placeholder='{"trainNumber":"3814","delayMinutes":12,"status":"DELAYED","route":[...]}'></textarea>
          </div>
        </div>
        <div class="actions">
          <button id="fetchBtn">Pobierz z API</button>
          <button class="secondary" id="demoBtn">Załaduj demo</button>
          <button class="secondary" id="jsonBtn">Wczytaj JSON</button>
          <button class="secondary" id="clearBtn">Wyczyść</button>
        </div>
        <p id="status" class="status">Gotowe.</p>
      </section>

      <section class="card">
        <h2>Wynik</h2>
        <div class="stats">
          <div class="stat"><div class="k">Pociąg</div><div class="v" id="trainOut">—</div></div>
          <div class="stat"><div class="k">Opóźnienie</div><div class="v" id="delayOut">—</div></div>
          <div class="stat"><div class="k">Ostatnia stacja</div><div class="v" id="stationOut" style="font-size:22px">—</div></div>
        </div>
        <div id="pillWrap"></div>
        <table>
          <thead>
            <tr>
              <th>Stacja</th>
              <th>Plan</th>
              <th>Rzeczywisty</th>
              <th>Opóźnienie</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const els = {
      apiUrl: $('apiUrl'), authType: $('authType'), customHeader: $('customHeader'), apiKey: $('apiKey'),
      trainNumber: $('trainNumber'), trainDate: $('trainDate'), extraBody: $('extraBody'), rawJson: $('rawJson'),
      fetchBtn: $('fetchBtn'), demoBtn: $('demoBtn'), jsonBtn: $('jsonBtn'), clearBtn: $('clearBtn'), status: $('status'),
      trainOut: $('trainOut'), delayOut: $('delayOut'), stationOut: $('stationOut'), pillWrap: $('pillWrap'), tableBody: $('tableBody')
    };

    els.trainDate.value = new Date().toISOString().slice(0,10);

    const demoData = {
      trainNumber: '3814',
      delayMinutes: 12,
      status: 'DELAYED',
      lastStation: 'Katowice',
      route: [
        { station: 'Kraków Główny', scheduled: '08:12', actual: '08:12', delayMinutes: 0, status: 'DEPARTED' },
        { station: 'Mysłowice', scheduled: '09:01', actual: '09:07', delayMinutes: 6, status: 'PASSED' },
        { station: 'Katowice', scheduled: '09:14', actual: '09:26', delayMinutes: 12, status: 'LAST_REPORTED' },
        { station: 'Gliwice', scheduled: '09:42', actual: null, delayMinutes: 12, status: 'FORECAST' }
      ]
    };

    function setStatus(msg, type='') {
      els.status.textContent = msg;
      els.status.className = 'status' + (type ? ' ' + type : '');
    }

    function renderPill(status, delay) {
      const cls = delay <= 0 ? 'ok' : delay < 10 ? 'warn' : 'danger';
      const text = status || (delay <= 0 ? 'On time' : 'Delayed');
      els.pillWrap.innerHTML = `<span class="pill ${cls}">${text}</span>`;
    }

    function render(data) {
      const route = Array.isArray(data.route) ? data.route : [];
      const delay = Number(data.delayMinutes ?? 0);
      els.trainOut.textContent = data.trainNumber || '—';
      els.delayOut.textContent = `${delay} min`;
      els.stationOut.textContent = data.lastStation || route.findLast?.(r => r.actual)?.station || route.at(-1)?.station || '—';
      renderPill(data.status, delay);
      els.tableBody.innerHTML = route.map(row => `
        <tr>
          <td>${escapeHtml(row.station || '—')}</td>
          <td class="mono">${escapeHtml(row.scheduled || '—')}</td>
          <td class="mono">${escapeHtml(row.actual || '—')}</td>
          <td>${Number(row.delayMinutes ?? 0)} min</td>
          <td class="muted">${escapeHtml(row.status || '—')}</td>
        </tr>
      `).join('') || '<tr><td colspan="5" class="muted">Brak danych trasy.</td></tr>';
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalizeResponse(input) {
      if (!input || typeof input !== 'object') throw new Error('Odpowiedź nie jest JSON-em.');
      if (input.route && Array.isArray(input.route)) return input;

      const trainNumber = input.trainNumber || input.train_no || input.number || input.id || '';
      const delayMinutes = Number(input.delayMinutes ?? input.delay_minutes ?? input.delay ?? input.currentDelay ?? 0);
      const lastStation = input.lastStation || input.last_station || input.currentStation || input.station || '';
      const status = input.status || input.trainStatus || (delayMinutes > 0 ? 'DELAYED' : 'ON_TIME');
      const stops = input.route || input.stops || input.stations || input.timetable || [];

      const route = Array.isArray(stops) ? stops.map((s) => ({
        station: s.station || s.name || s.stationName || s.stop_name || '—',
        scheduled: s.scheduled || s.plan || s.scheduledTime || s.arrival_scheduled || s.departure_scheduled || '—',
        actual: s.actual || s.real || s.actualTime || s.arrival_actual || s.departure_actual || null,
        delayMinutes: Number(s.delayMinutes ?? s.delay_minutes ?? s.delay ?? delayMinutes ?? 0),
        status: s.status || s.kind || '—'
      })) : [];

      return { trainNumber, delayMinutes, status, lastStation, route };
    }

    async function fetchTrainData() {
      const apiUrl = els.apiUrl.value.trim();
      const authType = els.authType.value;
      const apiKey = els.apiKey.value.trim();
      const customHeader = els.customHeader.value.trim();
      const trainNumber = els.trainNumber.value.trim();
      const trainDate = els.trainDate.value;

      if (!apiUrl) throw new Error('Uzupełnij Endpoint API.');
      if (!trainNumber) throw new Error('Uzupełnij numer pociągu.');

      let extraBody = {};
      if (els.extraBody.value.trim()) {
        extraBody = JSON.parse(els.extraBody.value);
      }

      const headers = { 'Content-Type': 'application/json' };
      if (authType === 'bearer' && apiKey) headers['Authorization'] = `Bearer ${apiKey}`;
      if (authType === 'x-api-key' && apiKey) headers['X-API-Key'] = apiKey;
      if (authType === 'custom-header' && apiKey && customHeader) headers[customHeader] = apiKey;

      const response = await fetch(apiUrl, {
        method: 'POST',
        headers,
        body: JSON.stringify({ trainNumber, trainDate, ...extraBody })
      });

      if (!response.ok) {
        const text = await response.text().catch(() => '');
        throw new Error(`HTTP ${response.status}: ${text || 'Błąd pobierania danych'}`);
      }

      return response.json();
    }

    els.fetchBtn.addEventListener('click', async () => {
      try {
        setStatus('Pobieram dane…');
        const raw = await fetchTrainData();
        const normalized = normalizeResponse(raw);
        render(normalized);
        setStatus('Dane pobrane poprawnie.', 'ok');
      } catch (err) {
        setStatus(err.message || 'Nie udało się pobrać danych.', 'error');
      }
    });

    els.demoBtn.addEventListener('click', () => {
      render(demoData);
      setStatus('Załadowano dane demo.', 'ok');
    });

    els.jsonBtn.addEventListener('click', () => {
      try {
        const value = els.rawJson.value.trim();
        if (!value) throw new Error('Wklej JSON do pola Tryb demo / ręczne wklejenie JSON.');
        const parsed = JSON.parse(value);
        render(normalizeResponse(parsed));
        setStatus('Wczytano dane z wklejonego JSON-a.', 'ok');
      } catch (err) {
        setStatus(err.message || 'Nie udało się wczytać JSON-a.', 'error');
      }
    });

    els.clearBtn.addEventListener('click', () => {
      els.rawJson.value = '';
      els.extraBody.value = '';
      els.apiKey.value = '';
      els.tableBody.innerHTML = '';
      els.trainOut.textContent = '—';
      els.delayOut.textContent = '—';
      els.stationOut.textContent = '—';
      els.pillWrap.innerHTML = '';
      setStatus('Wyczyszczono formularz.');
    });

    render(demoData);
  </script>
</body>
</html>

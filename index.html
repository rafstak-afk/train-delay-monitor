<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tablica Odjazdów PLK</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #101820;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 32px;
      font-weight: 700;
    }

    .top-buttons,
    .secondary-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 8px;
      background: #0b57d0;
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #084298;
      transform: translateY(-1px);
    }

    .search-box {
      margin: 24px auto;
      max-width: 500px;
      display: flex;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    .search-box button {
      padding: 14px 18px;
      border: none;
      border-radius: 8px;
      background: #198754;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .search-box button:hover {
      background: #157347;
    }

    .table-wrapper {
      margin-top: 30px;
      overflow-x: auto;
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1c2833;
    }

    thead {
      background: #243447;
    }

    th {
      padding: 16px;
      text-align: left;
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    td {
      padding: 16px;
      border-top: 1px solid #2f4054;
      font-size: 15px;
    }

    tr:hover {
      background: #253445;
    }

    .delay {
      color: #ffcc00;
      font-weight: bold;
    }

    .on-time {
      color: #5dd39e;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      opacity: 0.7;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 24px;
      }

      .search-box {
        flex-direction: column;
      }

      .search-box button {
        width: 100%;
      }

      th,
      td {
        padding: 12px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🚆 Tablica Odjazdów PLK</h1>

    <!-- GŁÓWNE PRZYCISKI -->
    <div class="top-buttons">

      <a class="btn"
         href="https://portalpasazera.pl"
         target="_blank">
        Portal Pasażera
      </a>

      <a class="btn"
         href="/debug.html">
        Debug
      </a>

    </div>

    <!-- DRUGI RZĄD -->
    <div class="secondary-buttons">

      <a class="btn"
         href="https://l.plk-sa.pl/#qr-generator"
         target="_blank">
        Generator QR PLK
      </a>

    </div>

    <!-- WYSZUKIWARKA -->
    <div class="search-box">

      <input
        type="text"
        id="stationInput"
        placeholder="Wpisz nazwę stacji..."
      />

      <button onclick="loadDepartures()">
        Szukaj
      </button>

    </div>

    <!-- TABLICA -->
    <div class="table-wrapper">

      <table>

        <thead>
          <tr>
            <th>Godzina</th>
            <th>Pociąg</th>
            <th>Kierunek</th>
            <th>Peron</th>
            <th>Opóźnienie</th>
          </tr>
        </thead>

        <tbody id="departuresBody">

          <tr>
            <td>12:15</td>
            <td>IC 3812</td>
            <td>Warszawa Centralna</td>
            <td>2</td>
            <td class="on-time">0 min</td>
          </tr>

          <tr>
            <td>12:22</td>
            <td>REGIO 44721</td>
            <td>Katowice</td>
            <td>1</td>
            <td class="delay">+7 min</td>
          </tr>

        </tbody>

      </table>

    </div>

    <div class="footer">
      Dane realtime PLK / Portal Pasażera
    </div>

  </div>

  <script>

    async function loadDepartures() {

      const station = document.getElementById("stationInput").value;

      if (!station) {
        alert("Wpisz nazwę stacji.");
        return;
      }

      console.log("Szukam stacji:", station);

      // TU PODPINASZ SWOJE API / WORKER
      // fetch('/api/departures?station=' + encodeURIComponent(station))

      alert("Tutaj podepniesz swoje API PLK.");

    }

  </script>

</body>
</html>

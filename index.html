<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monitor opóźnień RK</title>
  <style>
    :root{--bg:#f7f6f2;--surface:#fbfbf9;--surface2:#f3f0ec;--text:#28251d;--muted:#6f6d68;--border:rgba(40,37,29,.12);--primary:#01696f;--primary2:#0c4e54;--danger:#a13544;--warn:#da7101;--ok:#437a22;--shadow:0 10px 30px rgba(30,30,20,.08);--radius:16px}
    @media (prefers-color-scheme: dark){:root{--bg:#171614;--surface:#1c1b19;--surface2:#22211f;--text:#e4e1da;--muted:#9b988f;--border:rgba(228,225,218,.12);--primary:#4f98a3;--primary2:#227f8b;--danger:#dd6974;--warn:#fdab43;--ok:#6daa45;--shadow:0 12px 32px rgba(0,0,0,.35)}}
    *{box-sizing:border-box} body{margin:0;font:16px/1.5 Inter,ui-sans-serif,system-ui,sans-serif;color:var(--text);background:linear-gradient(180deg,var(--bg),var(--surface2));min-height:100vh}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}.header{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:20px}.brand{display:flex;gap:12px;align-items:center}.logo{width:42px;height:42px;border-radius:12px;background:var(--primary);color:white;display:grid;place-items:center;box-shadow:var(--shadow)}h1{font-size:clamp(26px,4vw,40px);line-height:1.08;margin:0}.subtitle{color:var(--muted);margin-top:4px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:20px}.card{background:color-mix(in srgb,var(--surface) 88%,transparent);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;backdrop-filter:blur(8px)}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}label{font-size:13px;color:var(--muted);font-weight:600}input,select,textarea{width:100%;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:12px;padding:12px 14px;outline:none}textarea{min-height:120px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 18%,transparent)}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}button{border:0;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer;background:var(--primary);color:white}button.secondary{background:transparent;color:var(--text);border:1px solid var(--border)}button:hover{background:var(--primary2)}button.secondary:hover{background:var(--surface2)}.hint,.status{color:var(--muted);font-size:14px}.status.error{color:var(--danger)}.status.ok{color:var(--ok)}.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px}.stat{padding:14px;border-radius:14px;background:var(--surface2);border:1px solid var(--border)}.stat .k{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}.stat .v{font-size:clamp(22px,5vw,34px);font-weight:800;margin-top:6px}.pill{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 12px;font-weight:700}.pill.ok{background:color-mix(in srgb,var(--ok) 15%,transparent);color:var(--ok)}.pill.warn{background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn)}.pill.danger{background:color-mix(in srgb,var(--danger) 15%,transparent);color:var(--danger)}table{width:100%;border-collapse:collapse;margin-top:14px}th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);vertical-align:top}th{font-size:13px;color:var(--muted)}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.muted{color:var(--muted)}@media (max-width:860px){.grid,.form-grid,.stats{grid-template-columns:1fr}.wrap{padding:16px}}
  </style>
</head>
<body>
<div class="wrap">
  <header class="header">
    <div class="brand">
      <div class="logo">🚆</div>
      <div>
        <h1>Train Delay Monitor</h1>
        <div class="subtitle">Wersja developerska: pociąg albo stacja, ręczny JSON i diagnostyka endpointu.</div>
      </div>
    </div>
  </header>
  <main class="grid">
    <section class="card">
      <h2>Konfiguracja</h2>
      <p class="hint">Możesz pytać po numerze pociągu albo po nazwie stacji. Dla stacji worker wyśle mode=station.</p>
      <div class="form-grid">
        <div class="field full"><label for="apiUrl">Endpoint API</label><input id="apiUrl" value="/api/train"></div>
        <div class="field"><label for="authType">Typ autoryzacji</label><select id="authType"><option value="none">Brak</option><option value="bearer">Bearer</option><option value="x-api-key">X-API-Key</option><option value="custom-header">Custom header</option></select></div>
        <div class="field"><label for="customHeader">Niestandardowy nagłówek</label><input id="customHeader" value="X-PLK-API-KEY"></div>
        <div class="field full"><label for="apiKey">API key</label><input id="apiKey" type="password" placeholder="Opcjonalnie"></div>
        <div class="field"><label for="trainNumber">Numer pociągu</label><input id="trainNumber" value=""></div>
        <div class="field"><label for="trainDate">Data kursu</label><input id="trainDate" type="date"></div>
        <div class="field full"><label for="stationName">Nazwa stacji</label><input id="stationName" placeholder="np. Tychy"></div>
        <div class="field full"><label for="extraBody">Dodatkowe pola JSON do body</label><textarea id="extraBody" placeholder='{"carrier":"IC"}'></textarea></div>
        <div class="field full"><label for="rawJson">Tryb demo — ręczne wklejenie JSON</label><textarea id="rawJson" placeholder='{"mode":"station","stationQuery":"Tychy","stationFound":true,"matchedStation":"Tychy","departures":[]}'></textarea></div>
      </div>
      <div class="actions">
        <button id="fetchBtn">Pobierz z API</button>
        <button class="secondary" id="demoBtn">Załaduj demo</button>
        <button class="secondary" id="jsonBtn">Wczytaj JSON</button>
        <button class="secondary" id="clearBtn">Wyczyść</button>
      </div>
      <p id="status" class="status">Gotowe.</p>
    </section>
    <section class="card">
      <h2>Wynik</h2>
      <div class="stats">
        <div class="stat"><div class="k">Tryb</div><div class="v" id="modeOut">—</div></div>
        <div class="stat"><div class="k">Obiekt</div><div class="v" id="trainOut">—</div></div>
        <div class="stat"><div class="k">Status</div><div class="v" id="stationOut" style="font-size:22px">—</div></div>
      </div>
      <div id="pillWrap"></div>
      <table>
        <thead><tr><th>Stacja / wpis</th><th>Plan</th><th>Rzeczywisty</th><th>Opóźnienie</th><th>Status</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>
  </main>
</div>
<script>
const $ = id => document.getElementById(id);
const els = { apiUrl:$('apiUrl'), authType:$('authType'), customHeader:$('customHeader'), apiKey:$('apiKey'), trainNumber:$('trainNumber'), trainDate:$('trainDate'), stationName:$('stationName'), extraBody:$('extraBody'), rawJson:$('rawJson'), fetchBtn:$('fetchBtn'), demoBtn:$('demoBtn'), jsonBtn:$('jsonBtn'), clearBtn:$('clearBtn'), status:$('status'), modeOut:$('modeOut'), trainOut:$('trainOut'), stationOut:$('stationOut'), pillWrap:$('pillWrap'), tableBody:$('tableBody') };
els.trainDate.value = new Date().toISOString().slice(0,10);
const demoTrain = { trainNumber:'3814', delayMinutes:12, status:'DELAYED', lastStation:'Katowice', route:[{station:'Kraków Główny',scheduled:'08:12',actual:'08:12',delayMinutes:0,status:'DEPARTED'},{station:'Mysłowice',scheduled:'09:01',actual:'09:07',delayMinutes:6,status:'PASSED'},{station:'Katowice',scheduled:'09:14',actual:'09:26',delayMinutes:12,status:'LAST_REPORTED'}] };
const demoStation = { mode:'station', stationQuery:'Tychy', stationFound:true, matchedStation:'Tychy', departures:[{trainNumber:'IC 63100', destination:'Bielsko-Biała', scheduled:'12:44', estimated:'12:49', delayMinutes:5, status:'DELAYED'},{trainNumber:'R 94615', destination:'Katowice', scheduled:'12:51', estimated:'12:51', delayMinutes:0, status:'ON_TIME'}] };
function setStatus(msg, type=''){ els.status.textContent = msg; els.status.className = 'status' + (type ? ' ' + type : ''); }
function esc(v){ return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
function renderPill(text, tone='ok'){ els.pillWrap.innerHTML = `<span class="pill ${tone}">${esc(text)}</span>`; }
function normalize(input){ if (!input || typeof input !== 'object') throw new Error('Odpowiedź nie jest JSON-em.'); if (input.mode === 'station' || input.stationFound !== undefined || Array.isArray(input.departures)) { return { mode:'station', object: input.matchedStation || input.stationName || input.stationQuery || 'stacja', status: input.stationFound === false ? 'Nie znaleziono stacji' : (input.status || 'Wynik stacyjny'), rows: Array.isArray(input.departures) ? input.departures.map(d => ({ name: [d.trainNumber, d.destination].filter(Boolean).join(' → '), scheduled: d.scheduled || d.plan || '', actual: d.estimated || d.actual || '', delay: Number(d.delayMinutes ?? d.delay ?? 0), status: d.status || '' })) : [] }; } const route = Array.isArray(input.route) ? input.route : Array.isArray(input.stops) ? input.stops : []; return { mode:'train', object: input.trainNumber || input.trainNo || input.number || 'pociąg', status: input.lastStation || input.currentStation || input.status || 'Wynik pociągu', rows: route.map(r => ({ name: r.station || r.name || r.stationName || '', scheduled: r.scheduled || r.plan || '', actual: r.actual || r.estimated || '', delay: Number(r.delayMinutes ?? r.delay ?? 0), status: r.status || '' })) }; }
function render(data){ const n = normalize(data); els.modeOut.textContent = n.mode; els.trainOut.textContent = n.object || '—'; els.stationOut.textContent = n.status || '—'; const worst = Math.max(0, ...n.rows.map(r => Number(r.delay || 0))); renderPill(worst === 0 ? 'On time / brak opóźnień' : `Maks. opóźnienie: ${worst} min`, worst === 0 ? 'ok' : worst < 10 ? 'warn' : 'danger'); els.tableBody.innerHTML = n.rows.length ? n.rows.map(r => `<tr><td>${esc(r.name)}</td><td class="mono">${esc(r.scheduled)}</td><td class="mono">${esc(r.actual)}</td><td>${Number(r.delay || 0)} min</td><td class="muted">${esc(r.status)}</td></tr>`).join('') : '<tr><td colspan="5" class="muted">Brak danych do wyświetlenia.</td></tr>'; }
async function fetchData(){ const apiUrl = els.apiUrl.value.trim(); if (!apiUrl) throw new Error('Uzupełnij Endpoint API.'); const trainNumber = els.trainNumber.value.trim(); const stationName = els.stationName.value.trim(); if (!trainNumber && !stationName) throw new Error('Wpisz numer pociągu albo nazwę stacji.'); let extraBody = {}; if (els.extraBody.value.trim()) extraBody = JSON.parse(els.extraBody.value); const headers = { 'Content-Type': 'application/json' }; const authType = els.authType.value; const apiKey = els.apiKey.value.trim(); const customHeader = els.customHeader.value.trim(); if (authType === 'bearer' && apiKey) headers['Authorization'] = `Bearer ${apiKey}`; if (authType === 'x-api-key' && apiKey) headers['X-API-Key'] = apiKey; if (authType === 'custom-header' && apiKey && customHeader) headers[customHeader] = apiKey; const body = { ...extraBody }; if (trainNumber) body.trainNumber = trainNumber; if (els.trainDate.value) body.trainDate = els.trainDate.value; if (stationName) { body.stationName = stationName; body.mode = 'station'; } const response = await fetch(apiUrl, { method:'POST', headers, body: JSON.stringify(body) }); if (!response.ok) { const text = await response.text().catch(() => ''); throw new Error(`HTTP ${response.status}: ${text || 'Błąd pobierania danych.'}`); } return response.json(); }
els.fetchBtn.addEventListener('click', async () => { try { setStatus('Pobieram dane...'); const raw = await fetchData(); render(raw); setStatus('Dane pobrane poprawnie.', 'ok'); } catch (e) { setStatus(e.message || 'Nie udało się pobrać danych.', 'error'); } });
els.demoBtn.addEventListener('click', () => { render(els.stationName.value.trim() ? demoStation : demoTrain); setStatus('Załadowano dane demo.', 'ok'); });
els.jsonBtn.addEventListener('click', () => { try { const v = els.rawJson.value.trim(); if (!v) throw new Error('Wklej JSON do pola demo.'); render(JSON.parse(v)); setStatus('Wczytano dane z JSON-a.', 'ok'); } catch (e) { setStatus(e.message, 'error'); } });
els.clearBtn.addEventListener('click', () => { els.trainNumber.value=''; els.stationName.value=''; els.extraBody.value=''; els.rawJson.value=''; els.apiKey.value=''; els.tableBody.innerHTML=''; els.modeOut.textContent='—'; els.trainOut.textContent='—'; els.stationOut.textContent='—'; els.pillWrap.innerHTML=''; setStatus('Wyczyszczono formularz.'); });
render(demoTrain);
</script>
</body>
</html>

<!-- index.html -->

<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Monitor opóźnień PLK</title>

<style>

body{
  font-family:Arial,sans-serif;
  margin:20px;
  background:#f5f5f5;
}

h1{
  margin-bottom:10px;
}

.small{
  margin-bottom:20px;
  color:#555;
}

.panel{
  background:white;
  border-radius:10px;
  padding:16px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:
    1fr
    180px
    150px
    auto;
  gap:12px;
  align-items:end;
}

label{
  display:block;
  font-size:14px;
  margin-bottom:6px;
}

input{
  width:100%;
  padding:10px;
  box-sizing:border-box;
}

button{
  padding:10px 18px;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  font-size:14px;
  text-align:left;
}

th{
  background:#f0f0f0;
}

.delay{
  color:red;
  font-weight:bold;
}

.ok{
  color:green;
  font-weight:bold;
}

pre{
  background:#111;
  color:#0f0;
  padding:12px;
  overflow:auto;
  border-radius:8px;
  font-size:12px;
}

a{
  color:#0b57d0;
}

</style>

</head>

<body>

<h1>Monitor opóźnień PLK</h1>

<div class="small">
Pobieranie realtime i rozkładu z API PLK.
</div>

<div class="panel">

<div class="grid">

<div>
<label>Stacja</label>

<input
  id="station"
  value="Tczew"
/>
</div>

<div>
<label>Data</label>

<input
  id="date"
  type="date"
/>
</div>

<div>
<label>Godzina</label>

<input
  id="time"
  type="time"
/>
</div>

<div>

<button onclick="loadData()">
Pobierz dane
</button>

</div>

</div>

</div>

<div class="panel">

<div id="summary">
Brak danych.
</div>

</div>

<table>

<thead>

<tr>
<th>STACJA</th>
<th>PLAN</th>
<th>RZECZ.</th>
<th>OPÓŹ.</th>
<th>STATUS</th>
<th>POCIĄG</th>
<th>KIERUNEK</th>
<th>PRZEWOŹNIK</th>
<th>PERON</th>
<th>PRZEZ</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

<h2>Debug</h2>

<pre id="debug"></pre>

<script>

const now = new Date();

document.getElementById("date").value =
  now.toISOString().split("T")[0];

document.getElementById("time").value =
  now.toTimeString().slice(0,5);

async function loadData() {

  try {

    const station =
      document.getElementById(
        "station"
      ).value;

    const date =
      document.getElementById(
        "date"
      ).value;

    const time =
      document.getElementById(
        "time"
      ).value;

    const response =
      await fetch("/train", {

        method:"POST",

        headers:{
          "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
          station,
          date,
          time
        })

      });

    const data =
      await response.json();

    console.log(data);

    document
      .getElementById("debug")
      .textContent =
        JSON.stringify(
          data.debug || data,
          null,
          2
        );

    if (!data.ok) {

      alert(
        data.error
        || "Błąd API"
      );

      return;

    }

    document
      .getElementById("summary")
      .innerHTML = `

Dane pobrane.
<br><br>

Stacja:
<b>${data.matchedStation}</b>

<br>

ID stacji:
<b>${data.matchedStationId}</b>

<br>

Rekordów:
<b>${data.totalDepartures}</b>

<br><br>

<a
  href="https://l.plk-sa.pl/${data.matchedStationId}"
  target="_blank"
>
Otwórz oficjalną tablicę odjazdów PLK
</a>

`;

    const tbody =
      document.getElementById(
        "tbody"
      );

    tbody.innerHTML = "";

    for (const row of data.route) {

      const tr =
        document.createElement("tr");

      tr.innerHTML = `
        <td>${row.station}</td>
        <td>${row.scheduled}</td>
        <td>${row.actual}</td>

        <td class="${
          row.delayMinutes > 0
          ? 'delay'
          : 'ok'
        }">

          ${row.delayMinutes} min

        </td>

        <td>${row.status}</td>
        <td>${row.trainNumber}</td>
        <td>${row.destination}</td>
        <td>${row.carrier}</td>
        <td>${row.platform}</td>
        <td>${row.via}</td>
      `;

      tbody.appendChild(tr);

    }

  } catch (error) {

    console.error(error);

    alert(
      "Frontend error: "
      + error.message
    );

  }

}

loadData();

</script>

</body>
</html>

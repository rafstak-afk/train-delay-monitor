<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablica odjazdów PLK</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #101820;
      color: #fff;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 24px;
    }

    .station-buttons,
    .secondary-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      background: #0b57d0;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      font-size: 15px;
    }

    .btn:hover {
      background: #084298;
    }

    .secondary-buttons .btn {
      background: #6f42c1;
    }

    .secondary-buttons .btn:hover {
      background: #59359a;
    }

    .search-box {
      margin: 26px auto;
      display: flex;
      gap: 10px;
      max-width: 620px;
    }

    .search-box input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: 0;
      font-size: 16px;
    }

    .search-box button {
      padding: 14px 18px;
      border-radius: 10px;
      border: 0;
      background: #198754;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .status {
      margin-top: 18px;
      min-height: 24px;
      opacity: 0.85;
    }

    .hint {
      margin-top: 30px;
      opacity: 0.7;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .search-box {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚆 Tablica odjazdów PLK</h1>

    <div class="station-buttons">
      <button class="btn" onclick="goToStation('Katowice')">Katowice</button>
      <button class="btn" onclick="goToStation('Chorzów Batory')">Chorzów Batory</button>
      <button class="btn" onclick="goToStation('Bytom')">Bytom</button>
      <button class="btn" onclick="goToStation('Gliwice')">Gliwice</button>
      <button class="btn" onclick="goToStation('Zabrze')">Zabrze</button>

      <a class="btn" href="https://portalpasazera.pl" target="_blank" rel="noopener">
        Portal Pasażera
      </a>

      <a class="btn" href="/debug.html">
        Debug
      </a>
    </div>

    <div class="secondary-buttons">
      <a class="btn" href="https://l.plk-sa.pl/#qr-generator" target="_blank" rel="noopener">
        Generator QR PLK
      </a>
    </div>

    <div class="search-box">
      <input
        id="stationInput"
        type="text"
        placeholder="Wpisz nazwę stacji, np. Katowice"
        onkeydown="handleEnter(event)"
      />

      <button onclick="searchStation()">
        Szukaj
      </button>
    </div>

    <div id="status" class="status">
      Wybierz stację albo wpisz nazwę.
    </div>

    <div class="hint">
      Po kliknięciu strona przechodzi w tej samej karcie, bez wyskakującego okna, bo przeglądarki nie lubią niespodzianek. Ludzie zresztą też.
    </div>
  </div>

  <script>
    const RESOLVER_ENDPOINTS = [
      "/resolve-link",
      "/resolve-link.js"
    ];

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function handleEnter(event) {
      if (event.key === "Enter") {
        searchStation();
      }
    }

    function searchStation() {
      const station = document.getElementById("stationInput").value.trim();

      if (!station) {
        setStatus("Wpisz nazwę stacji.");
        return;
      }

      goToStation(station);
    }

    async function goToStation(station) {
      setStatus("Szukam tablicy dla stacji: " + station + "...");

      let lastError = null;

      for (const endpoint of RESOLVER_ENDPOINTS) {
        try {
          const url = endpoint + "?station=" + encodeURIComponent(station);

          const response = await fetch(url, {
            method: "GET",
            headers: {
              "Accept": "application/json"
            }
          });

          if (!response.ok) {
            lastError = new Error("Resolver zwrócił HTTP " + response.status);
            continue;
          }

          const data = await response.json();

          const targetUrl =
            data.url ||
            data.link ||
            data.href ||
            data.redirectUrl;

          if (!targetUrl) {
            lastError = new Error("Brak pola url/link/href/redirectUrl w odpowiedzi resolvera.");
            continue;
          }

          window.location.href = targetUrl;
          return;

        } catch (error) {
          lastError = error;
        }
      }

      console.error(lastError);

      setStatus(
        "Nie udało się znaleźć tablicy dla stacji: " +
        station +
        ". Sprawdź resolver /resolve-link albo /resolve-link.js."
      );
    }
  </script>
</body>
</html>

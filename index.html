<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Monitor odjazdów PLK</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

  --bg:#0f1115;
  --panel:#1a1d24;
  --card:#22262f;

  --text:#f5f7fa;
  --muted:#9ea7b3;

  --accent:#4f8cff;

  --green:#1db954;
  --red:#ff4d4f;
  --yellow:#ffb020;

}

*{
  box-sizing:border-box;
}

body{

  margin:0;
  background:var(--bg);
  color:var(--text);

  font-family:
    Inter,
    sans-serif;

}

.header{

  position:sticky;
  top:0;

  z-index:100;

  background:rgba(15,17,21,.95);

  backdrop-filter:blur(10px);

  padding:16px;

  border-bottom:
    1px solid rgba(255,255,255,.06);

}

.title{

  font-size:24px;
  font-weight:700;

  margin-bottom:14px;

}

.search{

  display:flex;
  flex-direction:column;
  gap:10px;

}

input,
button{

  width:100%;

  border:none;
  border-radius:14px;

  padding:14px;

  font-size:16px;

}

input{

  background:var(--panel);
  color:var(--text);

}

button{

  background:var(--accent);
  color:white;

  font-weight:600;

}

.summary{

  padding:16px;

  color:var(--muted);

  font-size:14px;

}

.results{

  padding:12px;

  display:flex;
  flex-direction:column;
  gap:12px;

}

.card{

  background:var(--card);

  border-radius:18px;

  padding:16px;

  box-shadow:
    0 4px 16px rgba(0,0,0,.25);

}

.top{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:12px;

}

.time{

  font-size:34px;
  font-weight:700;

  line-height:1;

}

.actual{

  color:var(--muted);
  font-size:14px;
}

.delay{

  padding:6px 10px;

  border-radius:999px;

  font-size:13px;
  font-weight:700;

}

.delay.ok{

  background:
    rgba(29,185,84,.15);

  color:var(--green);

}

.delay.late{

  background:
    rgba(255,77,79,.15);

  color:var(--red);

}

.destination{

  font-size:22px;
  font-weight:700;

  margin-bottom:8px;

}

.meta{

  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;

  margin-top:12px;

}

.metaBox{

  background:
    rgba(255,255,255,.04);

  border-radius:12px;

  padding:10px;

}

.label{

  color:var(--muted);

  font-size:12px;

  margin-bottom:4px;

}

.value{

  font-size:15px;
  font-weight:600;

}

.link{

  color:var(--accent);
  text-decoration:none;

}

.loading{

  text-align:center;
  padding:30px;

  color:var(--muted);

}

.error{

  margin:16px;

  background:
    rgba(255,77,79,.15);

  color:var(--red);

  border-radius:14px;

  padding:14px;

}

</style>

</head>

<body>

<div class="header">

  <div class="title">
    Monitor odjazdów PLK
  </div>

  <div class="search">

    <input
      id="station"
      list="stationsHistory"
      placeholder="Wpisz stację"
    >

    <datalist id="stationsHistory"></datalist>

    <input
      id="date"
      type="date"
    >

    <input
      id="time"
      type="time"
    >

    <button id="loadBtn">
      Pobierz odjazdy
    </button>

  </div>

</div>

<div
  class="summary"
  id="summary"
>
Brak danych
</div>

<div
  id="error"
></div>

<div
  class="results"
  id="results"
></div>

<script>

const now =
  new Date();

document
  .getElementById("date")
  .value =
    now.toISOString()
      .split("T")[0];

document
  .getElementById("time")
  .value =
    now.toTimeString()
      .slice(0,5);

const stationInput =
  document.getElementById(
    "station"
  );

stationInput.value =
  localStorage.getItem(
    "lastStation"
  )
  || "Tarnowskie Góry";

renderHistory();

async function loadData(){

  const station =
    stationInput.value.trim();

  if(!station){
    return;
  }

  saveStation(station);

  document
    .getElementById("error")
    .innerHTML = "";

  document
    .getElementById("results")
    .innerHTML =
      `<div class="loading">
        Pobieranie danych...
      </div>`;

  try{

    const response =
      await fetch("/train",{

        method:"POST",

        headers:{
          "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

          station,

          date:
            document
              .getElementById("date")
              .value,

          time:
            document
              .getElementById("time")
              .value

        })

      });

    const data =
      await response.json();

    if(!data.ok){

      throw new Error(
        data.error
        || "Błąd API"
      );

    }

    document
      .getElementById("summary")
      .innerHTML = `

<b>${data.matchedStation}</b>
<br>
Odjazdów:
${data.totalDepartures}
<br><br>

<a
 class="link"
 href="https://l.plk-sa.pl/${data.portalStationId}"
 target="_blank"
>
Oficjalna tablica PLK
</a>

`;

    renderResults(data.route);

  }catch(error){

    document
      .getElementById("results")
      .innerHTML = "";

    document
      .getElementById("error")
      .innerHTML = `

<div class="error">

${error.message}

<br><br>

Możliwe że API PLK
tymczasowo zablokowało
zapytania (429 Rate Limit).

</div>

`;

  }

}

function renderResults(rows){

  const results =
    document.getElementById(
      "results"
    );

  results.innerHTML = "";

  for(const row of rows){

    const card =
      document.createElement(
        "div"
      );

    card.className =
      "card";

    card.innerHTML = `

<div class="top">

  <div>

    <div class="time">
      ${safe(row.scheduled)}
    </div>

    <div class="actual">
      rzeczywisty:
      ${safe(row.actual)}
    </div>

  </div>

  <div class="delay ${
    row.delayMinutes > 0
    ? "late"
    : "ok"
  }">

    ${safe(row.delayMinutes)} min

  </div>

</div>

<div class="destination">
  ${safe(row.destination)}
</div>

<div class="meta">

  <div class="metaBox">
    <div class="label">
      Pociąg
    </div>

    <div class="value">
      ${safe(row.trainNumber)}
    </div>
  </div>

  <div class="metaBox">
    <div class="label">
      Przewoźnik
    </div>

    <div class="value">
      ${safe(row.carrier)}
    </div>
  </div>

  <div class="metaBox">
    <div class="label">
      Peron
    </div>

    <div class="value">
      ${safe(row.platform)}
    </div>
  </div>

  <div class="metaBox">
    <div class="label">
      Przez
    </div>

    <div class="value">
      ${safe(row.via)}
    </div>
  </div>

</div>

`;

    results.appendChild(card);

  }

}

function safe(value){

  if(
    value === null
    || value === undefined
    || value === ""
  ){
    return "—";
  }

  return value;

}

function saveStation(station){

  localStorage.setItem(
    "lastStation",
    station
  );

  let history =
    JSON.parse(
      localStorage.getItem(
        "stationHistory"
      )
      || "[]"
    );

  history =
    history.filter(
      s => s !== station
    );

  history.unshift(station);

  history =
    history.slice(0,20);

  localStorage.setItem(
    "stationHistory",
    JSON.stringify(history)
  );

  renderHistory();

}

function renderHistory(){

  const history =
    JSON.parse(
      localStorage.getItem(
        "stationHistory"
      )
      || "[]"
    );

  const datalist =
    document.getElementById(
      "stationsHistory"
    );

  datalist.innerHTML = "";

  for(const station of history){

    const option =
      document.createElement(
        "option"
      );

    option.value =
      station;

    datalist.appendChild(option);

  }

}

document
  .getElementById("loadBtn")
  .addEventListener(
    "click",
    loadData
  );

stationInput
  .addEventListener(
    "keydown",
    e => {

      if(e.key === "Enter"){
        loadData();
      }

    }
  );

stationInput
  .addEventListener(
    "change",
    loadData
  );

loadData();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablica odjazdów PLK</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #101820;
      color: white;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 24px;
    }

    .station-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      background: #0b57d0;
      color: white;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      font-size: 15px;
    }

    .btn:hover {
      background: #084298;
    }

    .secondary-row {
      margin-bottom: 28px;
    }

    .btn-small {
      display: inline-block;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 7px;
      background: #4b5563;
      color: white;
      text-decoration: none;
      opacity: 0.85;
    }

    .btn-small:hover {
      opacity: 1;
      background: #374151;
    }

    .search-box {
      margin: 26px auto;
      display: flex;
      gap: 10px;
      max-width: 760px;
    }

    .search-box input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: 0;
      font-size: 16px;
    }

    .search-box button {
      padding: 14px 18px;
      border-radius: 10px;
      border: 0;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-official {
      background: #198754;
    }

    .btn-official:hover {
      background: #157347;
    }

    .btn-api {
      background: #0dcaf0;
      color: #102027 !important;
    }

    .btn-api:hover {
      background: #31d2f2;
    }

    .status {
      margin-top: 18px;
      min-height: 24px;
      opacity: 0.9;
    }

    .api-panel {
      margin-top: 34px;
      background: #1c2833;
      border-radius: 14px;
      padding: 18px;
      text-align: left;
    }

    .api-panel h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 8px;
    }

    .api-meta {
      text-align: center;
      opacity: 0.75;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #34495e;
      font-size: 14px;
    }

    th {
      background: #243447;
      text-align: left;
    }

    tr:hover {
      background: #253445;
    }

    .delay {
      color: #ffcc00;
      font-weight: 700;
    }

    .ontime {
      color: #5dd39e;
      font-weight: 700;
    }

    .muted {
      opacity: 0.65;
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .search-box {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>🚆 Tablica odjazdów PLK</h1>

    <div class="station-buttons">
      <button class="btn" onclick="openStation('Tarnowskie Góry')">Tarnowskie Góry</button>
      <button class="btn" onclick="openStation('Chorzów Batory')">Chorzów Batory</button>
      <button class="btn" onclick="openStation('Katowice')">Katowice</button>
      <button class="btn" onclick="openStation('Bytom')">Bytom</button>
      <button class="btn" onclick="openStation('Gliwice')">Gliwice</button>
      <button class="btn" onclick="openStation('Kraków Główny')">Kraków Główny</button>
    </div>

    <div class="secondary-row">
      <a
        class="btn-small"
        href="https://l.plk-sa.pl/#qr-generator"
        target="_blank"
        rel="noopener"
      >
        Generator QR PLK
      </a>
    </div>

    <div class="search-box">
      <input
        id="stationInput"
        type="text"
        placeholder="Wpisz nazwę stacji..."
        onkeydown="if(event.key === 'Enter') searchStation()"
      />

      <button class="btn-official" onclick="searchStation()">
        Otwórz PLK
      </button>

      <button class="btn-api" onclick="loadApiDeparturesFromInput()">
        Pokaż z API
      </button>
    </div>

    <div id="status" class="status">
      Wybierz stację albo wpisz nazwę.
    </div>

    <div class="api-panel">
      <h2>Własna tablica z API PLK</h2>
      <div id="apiMeta" class="api-meta">
        Kliknij „Pokaż z API”, żeby załadować odjazdy bez opuszczania strony.
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Godzina</th>
              <th>Plan</th>
              <th>Pociąg</th>
              <th>Nazwa</th>
              <th>Przewoźnik</th>
              <th>Peron</th>
              <th>Tor</th>
              <th>Opóźnienie</th>
            </tr>
          </thead>
          <tbody id="apiDeparturesBody">
            <tr>
              <td colspan="8" class="muted">
                Brak danych. Jeszcze. Spokojnie, backend już umie mówić.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function searchStation() {
      const station = document.getElementById("stationInput").value.trim();

      if (!station) {
        setStatus("Wpisz nazwę stacji.");
        return;
      }

      openStation(station);
    }

    function loadApiDeparturesFromInput() {
      const station = document.getElementById("stationInput").value.trim();

      if (!station) {
        setStatus("Wpisz nazwę stacji.");
        return;
      }

      loadApiDepartures(station);
    }

    async function openStation(station) {
      setStatus("Szukam tablicy PLK dla stacji: " + station + "...");

      const link = await resolveStationLink(station);

      if (!link) {
        setStatus("Nie udało się znaleźć tablicy PLK dla stacji: " + station);
        return;
      }

      setStatus("Otwieram tablicę PLK dla stacji: " + station + "...");
      window.location.href = link;
    }

    async function resolveStationLink(station) {
      const encoded = encodeURIComponent(station);

      const endpoints = [
        "/resolve-link?station=" + encoded,
        "/resolve-link?name=" + encoded,
        "/resolve-link?q=" + encoded,

        "/resolve-link.js?station=" + encoded,
        "/resolve-link.js?name=" + encoded,
        "/resolve-link.js?q=" + encoded,

        "/api/resolve-link?station=" + encoded,
        "/api/resolve-link?name=" + encoded,
        "/api/resolve-link?q=" + encoded,

        "/api/resolve?station=" + encoded,
        "/api/station-link?station=" + encoded,
        "/station-link?station=" + encoded
      ];

      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint, {
            method: "GET",
            headers: {
              "Accept": "application/json, text/plain, */*"
            }
          });

          if (!response.ok) continue;

          const text = await response.text();
          const link = extractLink(text);

          if (link) return link;

        } catch (error) {
          console.warn("Nieudany endpoint:", endpoint, error);
        }
      }

      return null;
    }

    function extractLink(text) {
      const trimmed = text.trim();

      if (!trimmed) return null;

      if (
        trimmed.startsWith("http://") ||
        trimmed.startsWith("https://")
      ) {
        return trimmed;
      }

      try {
        const json = JSON.parse(trimmed);

        const candidate =
          json.url ||
          json.link ||
          json.href ||
          json.redirectUrl ||
          json.target ||
          json.result ||
          json.data?.url ||
          json.data?.link ||
          json.data?.href;

        if (candidate && typeof candidate === "string") {
          return candidate;
        }

      } catch (_) {}

      const match = trimmed.match(/https?:\/\/[^\s"'<>]+/);
      return match ? match[0] : null;
    }

    async function loadApiDepartures(station) {
      const tbody = document.getElementById("apiDeparturesBody");
      const meta = document.getElementById("apiMeta");

      setStatus("Pobieram odjazdy z API PLK dla stacji: " + station + "...");
      meta.textContent = "Ładowanie danych z API PLK dla stacji: " + station + "...";

      tbody.innerHTML =
        '<tr><td colspan="8" class="muted">Ładowanie danych...</td></tr>';

      try {
        const response = await fetch(
          "/api/departures?station=" + encodeURIComponent(station),
          {
            headers: {
              "Accept": "application/json"
            }
          }
        );

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || data.details || "Błąd API");
        }

        const departures = Array.isArray(data.departures)
          ? data.departures
          : [];

        const upcoming = filterUpcomingDepartures(departures).slice(0, 30);

        meta.textContent =
          "Stacja: " +
          (data.station?.name || station) +
          " | Wygenerowano: " +
          formatDateTime(data.generatedAt) +
          " | Pokazuję najbliższe odjazdy.";

        renderDepartures(upcoming);

        setStatus("Załadowano odjazdy z API PLK dla stacji: " + (data.station?.name || station));

      } catch (error) {
        console.error(error);

        meta.textContent = "Nie udało się pobrać danych z API PLK.";
        tbody.innerHTML =
          '<tr><td colspan="8" class="muted">Błąd pobierania danych: ' +
          escapeHtml(error.message) +
          '</td></tr>';

        setStatus("Nie udało się pobrać odjazdów z API dla stacji: " + station);
      }
    }

    function filterUpcomingDepartures(departures) {
      const now = new Date();
      const nowMinutes = now.getHours() * 60 + now.getMinutes();

      return departures.filter(row => {
        const value = row.time || row.plannedTime || "";
        const minutes = parseTimeToMinutes(value);

        if (minutes === null) return true;

        return minutes >= nowMinutes - 5;
      });
    }

    function renderDepartures(departures) {
      const tbody = document.getElementById("apiDeparturesBody");

      if (!departures.length) {
        tbody.innerHTML =
          '<tr><td colspan="8" class="muted">Brak najbliższych odjazdów w danych API.</td></tr>';
        return;
      }

      tbody.innerHTML = departures.map(row => {
        const delay = Number(row.delay || 0);
        const delayClass = delay > 0 ? "delay" : "ontime";
        const delayText = delay > 0 ? "+" + delay + " min" : "0 min";

        const trainLabel = [
          row.category,
          row.train
        ].filter(Boolean).join(" ");

        return `
          <tr>
            <td><strong>${escapeHtml(shortTime(row.time))}</strong></td>
            <td>${escapeHtml(shortTime(row.plannedTime))}</td>
            <td>${escapeHtml(trainLabel)}</td>
            <td>${escapeHtml(row.name || "")}</td>
            <td>${escapeHtml(row.carrier || "")}</td>
            <td>${escapeHtml(row.platform || "")}</td>
            <td>${escapeHtml(row.track || "")}</td>
            <td class="${delayClass}">${delayText}</td>
          </tr>
        `;
      }).join("");
    }

    function shortTime(value) {
      if (!value) return "";

      const str = String(value);
      const match = str.match(/(\d{2}:\d{2})/);

      return match ? match[1] : str;
    }

    function parseTimeToMinutes(value) {
      const match = String(value || "").match(/(\d{2}):(\d{2})/);
      if (!match) return null;

      return Number(match[1]) * 60 + Number(match[2]);
    }

    function formatDateTime(value) {
      if (!value) return "brak daty";

      try {
        return new Date(value).toLocaleString("pl-PL");
      } catch (_) {
        return value;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>

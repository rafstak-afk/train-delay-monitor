<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Monitor odjazdów PLK</title>

<style>
:root{
  --bg:#0f1115;
  --panel:#1a1d24;
  --card:#22262f;
  --soft:#2b303b;
  --text:#f5f7fa;
  --muted:#9ea7b3;
  --accent:#4f8cff;
  --green:#1db954;
  --red:#ff4d4f;
  --yellow:#ffb020;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
}

.header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(15,17,21,.96);
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.title{
  font-size:24px;
  font-weight:800;
  margin-bottom:12px;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

input,button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px;
  font-size:16px;
}

input{
  background:var(--panel);
  color:var(--text);
  border:1px solid rgba(255,255,255,.08);
}

button{
  background:var(--accent);
  color:white;
  font-weight:700;
  cursor:pointer;
}

.summary{
  margin:12px;
  padding:14px;
  background:var(--panel);
  border-radius:16px;
  color:var(--muted);
  line-height:1.45;
}

.link{
  color:var(--accent);
  font-weight:700;
  text-decoration:none;
}

.results{
  padding:12px;
  display:grid;
  gap:12px;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:16px;
  box-shadow:0 6px 20px rgba(0,0,0,.22);
}

.cardTop{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  margin-bottom:12px;
}

.time{
  font-size:34px;
  font-weight:800;
  line-height:1;
}

.actual{
  margin-top:5px;
  color:var(--muted);
  font-size:13px;
}

.delay{
  padding:7px 10px;
  border-radius:999px;
  font-size:13px;
  font-weight:800;
  white-space:nowrap;
}

.delay.ok{
  color:var(--green);
  background:rgba(29,185,84,.14);
}

.delay.late{
  color:var(--red);
  background:rgba(255,77,79,.14);
}

.destination{
  font-size:22px;
  font-weight:800;
  margin-bottom:12px;
}

.meta{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.metaBox{
  background:rgba(255,255,255,.045);
  padding:10px;
  border-radius:12px;
  min-width:0;
}

.label{
  color:var(--muted);
  font-size:12px;
  margin-bottom:5px;
}

.value{
  font-size:15px;
  font-weight:700;
  overflow-wrap:anywhere;
}

.error{
  margin:12px;
  padding:14px;
  background:rgba(255,77,79,.14);
  color:#ffb4b4;
  border-radius:16px;
  line-height:1.45;
}

.debugWrap{
  margin:12px;
}

.debugTitle{
  color:var(--muted);
  font-size:14px;
  margin:12px 0 8px;
}

pre{
  background:#080a0f;
  color:#7dff9a;
  padding:12px;
  overflow:auto;
  border-radius:14px;
  font-size:12px;
  max-height:360px;
}

@media(min-width:760px){
  .grid{
    grid-template-columns:1fr 170px 140px 160px;
  }

  .results{
    grid-template-columns:1fr 1fr;
  }
}

@media(min-width:1120px){
  .results{
    grid-template-columns:1fr 1fr 1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Monitor odjazdów PLK</div>

  <div class="grid">
    <input id="station" list="stationsHistory" placeholder="Wpisz stację">
    <datalist id="stationsHistory"></datalist>

    <input id="date" type="date">
    <input id="time" type="time">

    <button id="loadBtn">Pobierz</button>
  </div>
</div>

<div class="summary" id="summary">
  Brak danych.
  <br>
  <a id="stationLink" class="link" href="https://l.plk-sa.pl/" target="_blank">
    Otwórz oficjalną tablicę PLK
  </a>
</div>

<div id="error"></div>
<div class="results" id="results"></div>

<div class="debugWrap">
  <div class="debugTitle">Debug</div>
  <pre id="debug">Brak danych debug.</pre>
</div>

<script>
const stationAliases = {
  "Tarnowskie Góry": "",
  "Tczew": ""
};

const now = new Date();

document.getElementById("date").value =
  now.toISOString().split("T")[0];

document.getElementById("time").value =
  now.toTimeString().slice(0,5);

const stationInput = document.getElementById("station");
const stationLink = document.getElementById("stationLink");

stationInput.value =
  localStorage.getItem("lastStation") || "Tarnowskie Góry";

renderHistory();

function updateStationLink(data){
  const id =
    data?.portalStationId ||
    localStorage.getItem("lastPortalStationId") ||
    "";

  if(id){
    stationLink.href = `https://l.plk-sa.pl/${id}`;
    stationLink.textContent = "Otwórz oficjalną tablicę PLK";
  } else {
    stationLink.href = "https://l.plk-sa.pl/";
    stationLink.textContent = "Otwórz stronę PLK";
  }
}

async function loadData(){
  const station = stationInput.value.trim();

  if(!station) return;

  saveStation(station);

  document.getElementById("error").innerHTML = "";
  document.getElementById("results").innerHTML = "";
  document.getElementById("debug").textContent = "Pobieranie danych...";

  updateStationLink(null);

  try{
    const response = await fetch("/train", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        station,
        date:document.getElementById("date").value,
        time:document.getElementById("time").value
      })
    });

    const data = await response.json();

    document.getElementById("debug").textContent =
      JSON.stringify(data.debug || data, null, 2);

    if(data.portalStationId){
      localStorage.setItem("lastPortalStationId", data.portalStationId);
    }

    updateStationLink(data);

    if(!data.ok){
      throw new Error(data.error || "Błąd API");
    }

    document.getElementById("summary").innerHTML = `
      <b>${safe(data.matchedStation)}</b>
      <br>
      Odjazdów: ${safe(data.totalDepartures)}
      <br>
      ID tablicy PLK: ${safe(data.portalStationId)}
      <br><br>
      <a id="stationLink" class="link" href="${safe(data.stationLink)}" target="_blank">
        Otwórz oficjalną tablicę PLK
      </a>
    `;

    renderResults(data.route || []);

  }catch(error){
    document.getElementById("error").innerHTML = `
      <div class="error">
        ${safe(error.message)}
        <br><br>
        Jeżeli widzisz PLK API 429, limit zapytań został czasowo wyczerpany.
        Link do tablicy PLK zostaje dostępny, jeżeli wcześniej udało się pobrać ID stacji.
      </div>
    `;

    document.getElementById("debug").textContent =
      error.stack || error.message || String(error);

    updateStationLink(null);
  }
}

function renderResults(rows){
  const results = document.getElementById("results");
  results.innerHTML = "";

  if(!rows.length){
    results.innerHTML = `
      <div class="card">
        Brak odjazdów dla wskazanego filtra.
      </div>
    `;
    return;
  }

  for(const row of rows){
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="cardTop">
        <div>
          <div class="time">${safe(row.scheduled)}</div>
          <div class="actual">rzeczywisty: ${safe(row.actual)}</div>
        </div>

        <div class="delay ${Number(row.delayMinutes) > 0 ? "late" : "ok"}">
          ${safe(row.delayMinutes)} min
        </div>
      </div>

      <div class="destination">${safe(row.destination)}</div>

      <div class="meta">
        <div class="metaBox">
          <div class="label">Pociąg</div>
          <div class="value">${safe(row.trainNumber)}</div>
        </div>

        <div class="metaBox">
          <div class="label">Przewoźnik</div>
          <div class="value">${safe(row.carrier)}</div>
        </div>

        <div class="metaBox">
          <div class="label">Peron</div>
          <div class="value">${safe(row.platform)}</div>
        </div>

        <div class="metaBox">
          <div class="label">Przez</div>
          <div class="value">${safe(row.via)}</div>
        </div>
      </div>
    `;

    results.appendChild(card);
  }
}

function safe(value){
  if(value === null || value === undefined || value === "") return "—";
  return String(value);
}

function saveStation(station){
  localStorage.setItem("lastStation", station);

  let history =
    JSON.parse(localStorage.getItem("stationHistory") || "[]");

  history = history.filter(s => s !== station);
  history.unshift(station);
  history = history.slice(0,20);

  localStorage.setItem("stationHistory", JSON.stringify(history));

  renderHistory();
}

function renderHistory(){
  const history =
    JSON.parse(localStorage.getItem("stationHistory") || "[]");

  const datalist = document.getElementById("stationsHistory");
  datalist.innerHTML = "";

  for(const station of history){
    const option = document.createElement("option");
    option.value = station;
    datalist.appendChild(option);
  }
}

document.getElementById("loadBtn").addEventListener("click", loadData);

stationInput.addEventListener("keydown", e => {
  if(e.key === "Enter") loadData();
});

stationInput.addEventListener("change", () => {
  loadData();
});

stationInput.addEventListener("input", () => {
  const history =
    JSON.parse(localStorage.getItem("stationHistory") || "[]");

  if(history.includes(stationInput.value.trim())){
    loadData();
  }
});

updateStationLink(null);
loadData();
</script>

</body>
</html>

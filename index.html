<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tablica odjazdów PLK</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #101820;
      color: white;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 24px;
    }

    .station-buttons,
    .secondary-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      background: #0b57d0;
      color: white;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      font-size: 15px;
      display: inline-block;
    }

    .btn:hover {
      background: #084298;
    }

    .secondary-buttons .btn {
      background: #6f42c1;
    }

    .secondary-buttons .btn:hover {
      background: #59359a;
    }

    .search-box {
      margin: 26px auto;
      display: flex;
      gap: 10px;
      max-width: 620px;
    }

    .search-box input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: 0;
      font-size: 16px;
    }

    .search-box button {
      padding: 14px 18px;
      border-radius: 10px;
      border: 0;
      background: #198754;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .search-box button:hover {
      background: #157347;
    }

    .status {
      margin-top: 18px;
      min-height: 24px;
      opacity: 0.9;
    }

    @media (max-width: 700px) {
      .search-box {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>🚆 Tablica odjazdów PLK</h1>

    <div class="station-buttons">
      <button class="btn" onclick="openStation('Katowice')">Katowice</button>
      <button class="btn" onclick="openStation('Chorzów Batory')">Chorzów Batory</button>
      <button class="btn" onclick="openStation('Bytom')">Bytom</button>
      <button class="btn" onclick="openStation('Gliwice')">Gliwice</button>
      <button class="btn" onclick="openStation('Zabrze')">Zabrze</button>

      <a class="btn" href="https://portalpasazera.pl" target="_blank" rel="noopener">
        Portal Pasażera
      </a>

      <a class="btn" href="/debug.html">
        Debug
      </a>
    </div>

    <div class="secondary-buttons">
      <a class="btn" href="https://l.plk-sa.pl/#qr-generator" target="_blank" rel="noopener">
        Generator QR PLK
      </a>
    </div>

    <div class="search-box">
      <input
        id="stationInput"
        type="text"
        placeholder="Wpisz nazwę stacji, np. Katowice"
        onkeydown="if(event.key === 'Enter') searchStation()"
      />

      <button onclick="searchStation()">
        Szukaj
      </button>
    </div>

    <div id="status" class="status">
      Wybierz stację albo wpisz nazwę.
    </div>

  </div>

  <script>
    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function searchStation() {
      const station = document.getElementById("stationInput").value.trim();

      if (!station) {
        setStatus("Wpisz nazwę stacji.");
        return;
      }

      openStation(station);
    }

    async function openStation(station) {
      setStatus("Szukam linku do tablicy: " + station + "...");

      try {
        const link = await resolveStationLink(station);

        if (!link) {
          throw new Error("Resolver nie zwrócił linku.");
        }

        setStatus("Otwieram tablicę: " + station);

        window.location.href = link;

      } catch (error) {
        console.error("Błąd resolvera:", error);

        setStatus(
          "Nie udało się wygenerować linku dla stacji: " +
          station +
          ". Sprawdź odpowiedź resolvera w konsoli."
        );
      }
    }

    async function resolveStationLink(station) {
      const endpoints = [
        "/resolve-link?station=" + encodeURIComponent(station),
        "/resolve-link?name=" + encodeURIComponent(station),
        "/resolve-link?q=" + encodeURIComponent(station),

        "/resolve-link.js?station=" + encodeURIComponent(station),
        "/resolve-link.js?name=" + encodeURIComponent(station),
        "/resolve-link.js?q=" + encodeURIComponent(station),

        "/api/resolve-link?station=" + encodeURIComponent(station),
        "/api/resolve-link?name=" + encodeURIComponent(station),
        "/api/resolve-link?q=" + encodeURIComponent(station)
      ];

      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint, {
            method: "GET",
            headers: {
              "Accept": "application/json, text/plain, */*"
            }
          });

          if (!response.ok) {
            continue;
          }

          const contentType = response.headers.get("content-type") || "";

          if (contentType.includes("application/json")) {
            const data = await response.json();

            console.log("Odpowiedź resolvera JSON:", endpoint, data);

            return (
              data.url ||
              data.link ||
              data.href ||
              data.redirectUrl ||
              data.target ||
              data.result ||
              null
            );
          }

          const text = await response.text();
          console.log("Odpowiedź resolvera TEXT:", endpoint, text);

          const trimmed = text.trim();

          if (trimmed.startsWith("http")) {
            return trimmed;
          }

          try {
            const parsed = JSON.parse(trimmed);

            return (
              parsed.url ||
              parsed.link ||
              parsed.href ||
              parsed.redirectUrl ||
              parsed.target ||
              parsed.result ||
              null
            );
          } catch (_) {
            // tekst nie był JSON-em, trudno, internet przeżyje
          }

        } catch (error) {
          console.warn("Nieudany endpoint:", endpoint, error);
        }
      }

      return null;
    }
  </script>
</body>
</html>

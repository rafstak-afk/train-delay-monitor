<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tablica odjazdów PLK</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #101820;
      color: white;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 24px;
    }

    .station-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      background: #0b57d0;
      color: white;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      font-size: 15px;
    }

    .btn:hover {
      background: #084298;
    }

    .secondary-row {
      margin-bottom: 28px;
    }

    .btn-small {
      display: inline-block;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 7px;
      background: #4b5563;
      color: white;
      text-decoration: none;
      opacity: 0.85;
    }

    .btn-small:hover {
      opacity: 1;
      background: #374151;
    }

    .search-box {
      margin: 26px auto;
      display: flex;
      gap: 10px;
      max-width: 620px;
    }

    .search-box input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: 0;
      font-size: 16px;
    }

    .search-box button {
      padding: 14px 18px;
      border-radius: 10px;
      border: 0;
      background: #198754;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .search-box button:hover {
      background: #157347;
    }

    .status {
      margin-top: 18px;
      min-height: 24px;
      opacity: 0.9;
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .search-box {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>🚆 Tablica odjazdów PLK</h1>

    <div class="station-buttons">
      <button class="btn" onclick="openStation('Tarnowskie Góry')">Tarnowskie Góry</button>
      <button class="btn" onclick="openStation('Chorzów Batory')">Chorzów Batory</button>
      <button class="btn" onclick="openStation('Katowice')">Katowice</button>
      <button class="btn" onclick="openStation('Bytom')">Bytom</button>
      <button class="btn" onclick="openStation('Gliwice')">Gliwice</button>
      <button class="btn" onclick="openStation('Kraków Główny')">Kraków Główny</button>
    </div>

    <div class="secondary-row">
      <a
        class="btn-small"
        href="https://l.plk-sa.pl/#qr-generator"
        target="_blank"
        rel="noopener"
      >
        Generator QR PLK
      </a>
    </div>

    <div class="search-box">
      <input
        id="stationInput"
        type="text"
        placeholder="Wpisz nazwę stacji..."
        onkeydown="if(event.key === 'Enter') searchStation()"
      />

      <button onclick="searchStation()">Szukaj</button>
    </div>

    <div id="status" class="status">
      Wybierz stację albo wpisz nazwę.
    </div>

  </div>

  <script>
    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function searchStation() {
      const station = document.getElementById("stationInput").value.trim();

      if (!station) {
        setStatus("Wpisz nazwę stacji.");
        return;
      }

      openStation(station);
    }

    async function openStation(station) {
      setStatus("Szukam tablicy dla stacji: " + station + "...");

      const link = await resolveStationLink(station);

      if (!link) {
        setStatus("Nie udało się znaleźć tablicy dla stacji: " + station);
        return;
      }

      setStatus("Otwieram tablicę dla stacji: " + station + "...");
      window.location.href = link;
    }

    async function resolveStationLink(station) {
      const encoded = encodeURIComponent(station);

      const endpoints = [
        "/resolve-link?station=" + encoded,
        "/resolve-link?name=" + encoded,
        "/resolve-link?q=" + encoded,

        "/resolve-link.js?station=" + encoded,
        "/resolve-link.js?name=" + encoded,
        "/resolve-link.js?q=" + encoded,

        "/api/resolve-link?station=" + encoded,
        "/api/resolve-link?name=" + encoded,
        "/api/resolve-link?q=" + encoded,

        "/api/resolve?station=" + encoded,
        "/api/station-link?station=" + encoded,
        "/station-link?station=" + encoded
      ];

      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint, {
            method: "GET",
            headers: {
              "Accept": "application/json, text/plain, */*"
            }
          });

          if (!response.ok) {
            continue;
          }

          const text = await response.text();
          const link = extractLink(text);

          if (link) {
            return link;
          }

        } catch (error) {
          console.warn("Nieudany endpoint:", endpoint, error);
        }
      }

      return null;
    }

    function extractLink(text) {
      const trimmed = text.trim();

      if (!trimmed) {
        return null;
      }

      if (
        trimmed.startsWith("http://") ||
        trimmed.startsWith("https://")
      ) {
        return trimmed;
      }

      try {
        const json = JSON.parse(trimmed);

        const candidate =
          json.url ||
          json.link ||
          json.href ||
          json.redirectUrl ||
          json.target ||
          json.result ||
          json.data?.url ||
          json.data?.link ||
          json.data?.href;

        if (candidate && typeof candidate === "string") {
          return candidate;
        }

      } catch (_) {
        // Nie JSON. Internet znowu wybrał chaos.
      }

      const match = trimmed.match(/https?:\/\/[^\s"'<>]+/);

      return match ? match[0] : null;
    }
  </script>
</body>
</html>

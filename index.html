<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Monitor odjazdów PLK</title>

<style>
:root{
  --blue:#284c75;
  --blue2:#2f70b8;
  --yellow:#ffe600;
  --bg:#e9e9e9;
  --text:#ffffff;
  --muted:#d8e5f5;
  --line:#203d60;
  --danger:#ffdddd;
  --dangerText:#9b0000;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:var(--bg);
  font-family:Arial,sans-serif;
  color:#111;
}

.header{
  background:#07588b;
  color:white;
  padding:8px 12px 12px;
}

.brand{
  font-size:11px;
  font-weight:bold;
  opacity:.95;
  margin-bottom:12px;
}

.title{
  font-size:20px;
  font-weight:bold;
  text-align:center;
}

.controls{
  background:#f3f3f3;
  border-bottom:1px solid #ccc;
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 135px 110px 120px;
  gap:8px;
  align-items:center;
}

input,button{
  height:38px;
  border:1px solid #bbb;
  border-radius:5px;
  padding:0 10px;
  font-size:15px;
}

button{
  border:none;
  background:#006bc7;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.quick{
  display:flex;
  gap:6px;
  overflow:auto;
  padding:8px 0 0;
}

.quick a{
  height:30px;
  padding:6px 10px;
  border-radius:999px;
  background:#ffffff;
  color:#07588b;
  border:1px solid #b9cbe0;
  white-space:nowrap;
  font-size:13px;
  text-decoration:none;
  font-weight:bold;
}

.quick a:hover{
  background:#e7f1ff;
}

.summary{
  padding:8px 12px;
  font-size:13px;
  color:#333;
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}

.summary a{
  color:#07588b;
  font-weight:bold;
}

.board{
  margin:0 10px 10px;
  background:var(--blue);
  color:var(--text);
  width:calc(100% - 20px);
}

.boardHead{
  background:var(--blue);
  color:var(--yellow);
  padding:8px 10px 4px;
  font-style:italic;
  font-weight:bold;
  font-size:34px;
  line-height:1;
}

.subHead{
  display:grid;
  grid-template-columns:90px 80px 1.25fr 2.1fr 70px;
  color:var(--yellow);
  font-style:italic;
  font-weight:bold;
  padding:4px 10px 6px;
  gap:10px;
  border-bottom:1px solid var(--line);
}

.row{
  display:grid;
  grid-template-columns:90px 80px 1.25fr 2.1fr 70px;
  gap:10px;
  padding:7px 10px;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:#2f70b8;
}

.row:nth-child(even){ background:#284c75; }

.time{
  font-size:27px;
  line-height:1;
}

.train{
  text-align:center;
  line-height:1.05;
}

.trainMain{ font-size:20px; }
.trainSub{ font-size:11px; }

.dest{
  font-size:20px;
  font-weight:bold;
  line-height:1.05;
}

.via{
  font-size:18px;
  line-height:1.15;
}

.platform{
  font-size:28px;
  text-align:center;
}

.delay{
  font-size:12px;
  margin-top:3px;
  color:#ffef9c;
}

.error{
  margin:10px;
  background:var(--danger);
  color:var(--dangerText);
  padding:10px;
  border-radius:8px;
  font-size:14px;
}

.debugWrap{ margin:10px; }

.debugTitle{
  cursor:pointer;
  font-weight:bold;
  margin-bottom:6px;
}

pre{
  display:none;
  background:#111;
  color:#7dff9a;
  padding:10px;
  overflow:auto;
  max-height:330px;
  font-size:12px;
  border-radius:8px;
}

.debugWrap.open pre{ display:block; }

@media(max-width:760px){
  .grid{ grid-template-columns:1fr 1fr; }
  .grid input:first-child{ grid-column:1 / -1; }
  .grid button{ grid-column:1 / -1; }

  .boardHead{ font-size:26px; }
  .subHead{ display:none; }

  .row{
    grid-template-columns:66px 58px 1fr 42px;
    grid-template-areas:
      "time train dest platform"
      "time train via platform";
    gap:6px;
    padding:8px;
  }

  .time{
    grid-area:time;
    font-size:23px;
  }

  .train{ grid-area:train; }
  .trainMain{ font-size:17px; }
  .trainSub{ font-size:10px; }

  .dest{
    grid-area:dest;
    font-size:17px;
  }

  .via{
    grid-area:via;
    font-size:13px;
    color:var(--muted);
    white-space:normal;
  }

  .platform{
    grid-area:platform;
    font-size:24px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="brand">PKP POLSKIE LINIE KOLEJOWE S.A.</div>
  <div class="title">Wyświetlacz stacyjny: <span id="stationTitle">Tarnowskie Góry</span></div>
</div>

<div class="controls">
  <div class="grid">
    <input id="station" list="stationsHistory" placeholder="Wpisz stację">
    <datalist id="stationsHistory"></datalist>

    <input id="date" type="date">
    <input id="time" type="time">

    <button id="loadBtn">Pobierz</button>
  </div>

  <div class="quick" id="quickStations"></div>
</div>

<div class="summary" id="summary">
  <span>Brak danych.</span>
  <a id="stationLink" href="https://l.plk-sa.pl/71001" target="_blank">Oficjalna tablica PLK</a>
</div>

<div id="error"></div>

<div class="board">
  <div class="boardHead">ODJAZDY Departures</div>

  <div class="subHead">
    <div>Godzina<br>Time</div>
    <div>Pociąg<br>Train</div>
    <div>Stacja docelowa<br>Destination</div>
    <div>Stacje pośrednie / Informacje dodatkowe<br>Via stations / Additional information</div>
    <div>Peron<br>Platform</div>
  </div>

  <div id="results"></div>
</div>

<div class="debugWrap" id="debugWrap">
  <div class="debugTitle" id="debugToggle">Debug</div>
  <pre id="debug">Brak danych debug.</pre>
</div>

<script>
const quickStations = [
  { name:"Lubliniec", link:"https://l.plk-sa.pl/71183" },
  { name:"Tarnowskie Góry", link:"https://l.plk-sa.pl/71001" },
  { name:"Bytom", link:"https://l.plk-sa.pl/71016" },
  { name:"Gliwice", link:"https://l.plk-sa.pl/71026" },
  { name:"Chorzów Batory", link:"https://l.plk-sa.pl/71041" },
  { name:"Katowice", link:"https://l.plk-sa.pl/71000" },
  { name:"Kraków Główny", link:"https://l.plk-sa.pl/73000" }
];

const now = new Date();

document.getElementById("date").value =
  now.toISOString().split("T")[0];

document.getElementById("time").value =
  now.toTimeString().slice(0,5);

const stationInput = document.getElementById("station");
const stationLink = document.getElementById("stationLink");

stationInput.value =
  localStorage.getItem("lastStation") || "Tarnowskie Góry";

renderHistory();
renderQuickStations();

function renderQuickStations(){
  const box = document.getElementById("quickStations");
  box.innerHTML = "";

  for(const item of quickStations){
    const a = document.createElement("a");
    a.textContent = item.name;
    a.href = item.link;
    a.target = "_blank";
    a.rel = "noopener";
    box.appendChild(a);
  }
}

function updateStationLink(data){
  const station = stationInput.value.trim();
  const quick = quickStations.find(x => x.name === station);

  const link =
    data?.stationLink ||
    quick?.link ||
    localStorage.getItem("lastStationLink") ||
    "https://l.plk-sa.pl/";

  stationLink.href = link;
}

async function loadData(){
  const station = stationInput.value.trim();
  if(!station) return;

  saveStation(station);

  document.getElementById("stationTitle").textContent = station;
  document.getElementById("error").innerHTML = "";
  document.getElementById("results").innerHTML = "";
  document.getElementById("debug").textContent = "Pobieranie danych...";

  updateStationLink(null);

  try{
    const response = await fetch("/train", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        station,
        date:document.getElementById("date").value,
        time:document.getElementById("time").value
      })
    });

    const data = await response.json();

    document.getElementById("debug").textContent =
      JSON.stringify(data.debug || data, null, 2);

    if(data.stationLink){
      localStorage.setItem("lastStationLink", data.stationLink);
    }

    updateStationLink(data);

    if(!data.ok){
      throw new Error(data.error || "Błąd API");
    }

    document.getElementById("stationTitle").textContent = data.matchedStation;

    document.getElementById("summary").innerHTML = `
      <span>
        Dane odświeżone. Rekordów: <b>${safe(data.totalDepartures)}</b>.
        Źródło: <b>${safe(data.debug?.source)}</b>
      </span>
      <a id="stationLink" href="${safe(data.stationLink)}" target="_blank">Oficjalna tablica PLK</a>
    `;

    renderResults(data.route || []);
  }catch(error){
    document.getElementById("error").innerHTML = `
      <div class="error">
        ${safe(error.message)}
      </div>
    `;

    document.getElementById("debug").textContent =
      error.stack || error.message || String(error);

    updateStationLink(null);
  }
}

function renderResults(rows){
  const results = document.getElementById("results");
  results.innerHTML = "";

  if(!rows.length){
    results.innerHTML = `
      <div class="row">
        <div class="time">—</div>
        <div class="train">—</div>
        <div class="dest">Brak danych</div>
        <div class="via">Zmień godzinę albo poczekaj na odnowienie limitu API.</div>
        <div class="platform">—</div>
      </div>
    `;
    return;
  }

  for(const row of rows){
    const div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
      <div class="time">
        ${safe(row.scheduled)}
        ${Number(row.delayMinutes) > 0 ? `<div class="delay">+${safe(row.delayMinutes)} min</div>` : ""}
      </div>

      <div class="train">
        <div class="trainMain">${mainTrain(row.trainNumber)}</div>
        <div class="trainSub">${safe(row.trainNumber)}</div>
      </div>

      <div class="dest">${safe(row.destination)}</div>
      <div class="via">${safe(row.via)}</div>
      <div class="platform">${safe(row.platform)}</div>
    `;

    results.appendChild(div);
  }
}

function mainTrain(value){
  const text = safe(value);
  if(text === "—") return "—";

  const first = text.split(/\s+/)[0];
  return first || text;
}

function safe(value){
  if(value === null || value === undefined || value === "") return "—";
  return String(value);
}

function saveStation(station){
  localStorage.setItem("lastStation", station);

  let history =
    JSON.parse(localStorage.getItem("stationHistory") || "[]");

  history = history.filter(s => s !== station);
  history.unshift(station);
  history = history.slice(0,20);

  localStorage.setItem("stationHistory", JSON.stringify(history));

  renderHistory();
}

function renderHistory(){
  const history =
    JSON.parse(localStorage.getItem("stationHistory") || "[]");

  const datalist = document.getElementById("stationsHistory");
  datalist.innerHTML = "";

  for(const station of history){
    const option = document.createElement("option");
    option.value = station;
    datalist.appendChild(option);
  }
}

document.getElementById("loadBtn").addEventListener("click", loadData);

stationInput.addEventListener("keydown", e => {
  if(e.key === "Enter") loadData();
});

stationInput.addEventListener("change", () => {
  loadData();
});

stationInput.addEventListener("input", () => {
  const history =
    JSON.parse(localStorage.getItem("stationHistory") || "[]");

  if(history.includes(stationInput.value.trim())){
    loadData();
  }
});

document.getElementById("debugToggle").addEventListener("click", () => {
  document.getElementById("debugWrap").classList.toggle("open");
});

updateStationLink(null);
loadData();
</script>

</body>
</html>

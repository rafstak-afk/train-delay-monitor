<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Monitor opóźnień PLK</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: #192448;
      --text: #eef2ff;
      --muted: #aab6dc;
      --border: #2b3a70;
      --ok: #53d38d;
      --warn: #ffcf66;
      --bad: #ff7e87;
      --accent: #78b0ff;
      --radius: 16px;
      --shadow: 0 14px 32px rgba(0,0,0,.28);
      font-family: Inter, system-ui, sans-serif;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg,#08101e,#0d1630 35%,#0f1934);
      color: var(--text);
      font: 16px/1.45 Inter, system-ui, sans-serif;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 20px;
    }
    .card {
      background: rgba(18,25,51,.95);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    h1,h2,h3 { margin: 0 0 12px; }
    p { margin: 0; }
    .muted { color: var(--muted); }
    .grid { display: grid; gap: 16px; }
    .form-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
      align-items: end;
    }
    label { display: grid; gap: 8px; font-weight: 600; }
    input, select, button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      font: inherit;
    }
    input, select {
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
    }
    button {
      cursor: pointer;
      border: none;
      background: linear-gradient(180deg,#8abbff,#5f96f5);
      color: #071121;
      font-weight: 800;
    }
    button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3,minmax(0,1fr));
      gap: 12px;
    }
    .stat {
      padding: 14px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
    }
    .stat .k {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }
    .stat .v {
      font-size: 28px;
      font-weight: 800;
      margin-top: 6px;
    }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    .table-wrap {
      overflow: auto;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    th {
      background: #152046;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: .06em;
    }
    .portal-box {
      background: #0b132d;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 16px;
    }
    .portal-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      text-decoration: none;
      color: var(--text);
      background: rgba(255,255,255,.03);
    }
    .portal-url {
      font-family: ui-monospace, SFMono-Regular, monospace;
      color: #dce5ff;
      word-break: break-all;
    }
    .hidden { display: none !important; }
    @media (max-width: 820px) {
      .wrap { padding: 16px; }
      .stats { grid-template-columns: 1fr; }
      table { min-width: 720px; }
    }
  </style>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Szczegóły pociągu</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#101820;
  color:white;
  font-family:Arial,sans-serif;
}

.card{
  background:#1c2833;
  border:1px solid #34495e;
  border-radius:10px;
  padding:20px;
  margin-bottom:20px;
}

.big{
  font-size:36px;
  font-weight:bold;
}

.delay{
  font-size:28px;
  font-weight:bold;
  color:#f1c40f;
}

.label{
  opacity:.8;
  margin-top:10px;
}

.value{
  font-size:20px;
  font-weight:bold;
}

a{
  color:#8ec5ff;
}
</style>

</head>
<body>

<p>
  <a href="/monitorowane-poci← Powrót do monitora
  </a>
</p>

<div class="card">

  <div id="train" class="big">
    Ładowanie...
  </div>

  <div id="destination"></div>

  <div id="delay" class="delay"></div>

  <div id="status"></div>

  <div id="platform"></div>

  <div id="track"></div>

</div>

<div class="card">

  <div class="label">
    Ostatnia potwierdzona stacja
  </div>

  <div
    id="lastConfirmedStation"
    class="value">
    -
  </div>

  <div
    id="lastConfirmedTime">
    -
  </div>

</div>

<div class="card">

  <div class="label">
    Identyfikatory PLK
  </div>

  <div id="ids"></div>

</div>

<script>

const params =
  new URLSearchParams(location.search);

const train =
  params.get('train') || '';

fetch(
  `/api/train-details?train=${encodeURIComponent(train)}`
)
.then(r => r.json())
.then(data => {

  document.getElementById('train').textContent =
    `${data.category || ''} ${data.name || ''} ${data.train || ''}`;

  document.getElementById('destination').textContent =
    `Cel podróży: ${data.destination || '-'}`;

  document.getElementById('delay').textContent =
    `Opóźnienie: ${data.delay ?? 0} min`;

  document.getElementById('status').textContent =
    `Status: ${data.status || '-'}`;

  document.getElementById('platform').textContent =
    `Peron: ${data.platform || '-'}`;

  document.getElementById('track').textContent =
    `Tor: ${data.track || '-'}`;

  document.getElementById('lastConfirmedStation').textContent =
    data.lastConfirmedStation || '-';

  document.getElementById('lastConfirmedTime').textContent =
    data.lastConfirmedTime || '-';

  document.getElementById('ids').innerHTML =
    `
    scheduleId: ${data.scheduleId || '-'}<br>
    orderId: ${data.orderId || '-'}<br>
    trainOrderId: ${data.trainOrderId || '-'}
    `;
});

</script>

</body>
</html>

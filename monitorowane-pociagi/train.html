<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Szczegóły pociągu</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:12px;
  background:#101820;
  color:#fff;
  font-family:Segoe UI,Arial,sans-serif;
}

a{
  color:#8ec5ff;
  text-decoration:none;
}

.card{
  background:#1c2833;
  border:1px solid #34495e;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}

.trainNumber{
  font-size:30px;
  font-weight:700;
}

.trainName{
  font-size:20px;
  margin-top:4px;
}

.destination{
  color:#9ecfff;
  margin-top:6px;
}

.delay{
  margin-top:14px;
  font-size:34px;
  font-weight:700;
}

.delay.good{
  color:#2ecc71;
}

.delay.medium{
  color:#f1c40f;
}

.delay.bad{
  color:#e74c3c;
}

.label{
  font-size:12px;
  color:#95a5a6;
  letter-spacing:.5px;
  text-transform:uppercase;
  margin-bottom:6px;
}

.value{
  font-size:22px;
  font-weight:600;
}

.meta{
  margin-top:12px;
  line-height:1.7;
}

.route{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.routeItem{
  padding:10px 12px;
  border-radius:10px;
  background:#16222d;
}

.routePast{
  opacity:.65;
}

.routeCurrent{
  background:#245d34;
  font-weight:700;
  border:1px solid #2ecc71;
}

.routeFuture{
  opacity:1;
}

.small{
  font-size:12px;
  opacity:.75;
}

</style>
</head>

<body>

<p>
/monitorowane-pociagi/
← Powrót do monitora
</a>
</p>

<div class="card">

  <div class="trainNumber" id="trainNumber">
    ...
  </div>

  <div class="trainName" id="trainName"></div>

  <div class="destination" id="destination"></div>

  <div id="delay" class="delay">
    ...
  </div>

  <div class="meta">
    <div id="status"></div>
    <div id="platform"></div>
    <div id="track"></div>
  </div>

</div>

<div class="card">

  <div class="label">
    Ostatnia potwierdzona stacja
  </div>

  <div id="lastConfirmedStation" class="value">
    -
  </div>

  <div id="lastConfirmedTime"></div>

</div>

<div class="card">

  <div class="label">
    Trasa przejazdu
  </div>

  <div id="route" class="route">
    Ładowanie...
  </div>

</div>

<script>

const params =
  new URLSearchParams(location.search);

const train =
  params.get('train') || '';

fetch(
  `/api/train-details?train=${encodeURIComponent(train)}`
)
.then(r => r.json())
.then(data => {

  document.getElementById('trainNumber').textContent =
    `${data.category || ''} ${data.train || ''}`;

  document.getElementById('trainName').textContent =
    data.name || '';

  document.getElementById('destination').textContent =
    `→ ${data.destination || '-'}`;

  const delay =
    Number(data.delay || 0);

  const delayElement =
    document.getElementById('delay');

  delayElement.textContent =
    `+${delay} min`;

  delayElement.classList.remove(
    'good',
    'medium',
    'bad'
  );

  if (delay <= 5) {
    delayElement.classList.add('good');
  }
  else if (delay <= 15) {
    delayElement.classList.add('medium');
  }
  else {
    delayElement.classList.add('bad');
  }

  document.getElementById('status').textContent =
    `Status: ${data.status || '-'} (${data.trainStatus || '-'})`;

  document.getElementById('platform').textContent =
    `Peron: ${data.platform || '-'}`;

  document.getElementById('track').textContent =
    `Tor: ${data.track || '-'}`;

  document.getElementById('lastConfirmedStation').textContent =
    data.lastConfirmedStation || '-';

  document.getElementById('lastConfirmedTime').textContent =
    data.lastConfirmedTime || '-';

  const current =
    data.lastConfirmedStation;

  let currentReached = false;

  document.getElementById('route').innerHTML =
    (data.route || [])
      .map(station => {

        let cls = 'routeFuture';
        let icon = '○';

        if (!currentReached) {
          cls = 'routePast';
          icon = '●';
        }

        if (
          station.stationName === current
        ) {
          cls = 'routeCurrent';
          icon = '▶';
          currentReached = true;
        }

        return `
          <div class="routeItem ${cls}">
            ${icon}
            ${station.stationName || station.stationId}
          </div>
        `;
      })
      .join('');

});

</script>

</body>
</html>

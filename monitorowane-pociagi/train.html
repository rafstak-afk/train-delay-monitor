<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Szczegóły pociągu</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#101820;
  color:white;
  font-family:Arial,sans-serif;
}

.card{
  background:#1c2833;
  border:1px solid #34495e;
  border-radius:10px;
  padding:20px;
  margin-bottom:20px;
}

.big{
  font-size:36px;
  font-weight:bold;
}

.small{
  opacity:.8;
}

.delay{
  font-size:32px;
  font-weight:bold;
  color:#f1c40f;
}

a{
  color:#8ec5ff;
}
</style>

</head>
<body>

<p>
  <a href="/monitorowane-pociagi/wrót do monitora
  </a>
</p>

<div class="card">
  <div id="train" class="big">Ładowanie...</div>

  <div id="destination"></div>

  <br>

  <div id="status"></div>

  <div id="delay" class="delay"></div>

  <div id="platform"></div>

  <div id="track"></div>
</div>

<div class="card">
  <h3>Identyfikatory PLK</h3>

  <div id="ids"></div>
</div>

<script>

const params =
  new URLSearchParams(location.search);

const train =
  params.get('train') || '';

fetch(`/api/train-details?train=${encodeURIComponent(train)}`)
  .then(r => r.json())
  .then(data => {

    document.getElementById('train').textContent =
      `${data.category || ''} ${data.name || ''} ${data.train || ''}`;

    document.getElementById('destination').textContent =
      `Cel: ${data.destination || '-'}`;

    document.getElementById('status').textContent =
      `Status: ${data.status || '-'}`;

    document.getElementById('delay').textContent =
      `Opóźnienie: ${data.delay ?? 0} min`;

    document.getElementById('platform').textContent =
      `Peron: ${data.platform || '-'}`;

    document.getElementById('track').textContent =
      `Tor: ${data.track || '-'}`;

    document.getElementById('ids').innerHTML = `
      scheduleId: ${data.scheduleId || '-'}<br>
      orderId: ${data.orderId || '-'}<br>
      trainOrderId: ${data.trainOrderId || '-'}
    `;
  });

</script>

</body>
</html>

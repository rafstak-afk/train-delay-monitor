<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Szczegóły pociągu</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#101820;
  color:white;
  font-family:Arial,sans-serif;
}

.card{
  background:#1c2833;
  border:1px solid #34495e;
  border-radius:10px;
  padding:20px;
  margin-bottom:20px;
}

.big{
  font-size:36px;
  font-weight:bold;
}

a{
  color:#8ec5ff;
}

.route{
  margin-top:20px;
}
</style>

</head>
<body>

<p>
  <a href="/monitorowane-pociagiowrót do monitora
  </a>
</p>

<div class="card">
  <div id="train" class="big"></div>

  <div id="status"></div>

  <div id="lastStation"></div>

  <div id="lastTime"></div>
</div>

<div class="card">
  <h3>Trasa pociągu</h3>

  <div id="route" class="route">
    Brak danych
  </div>
</div>

<script>

const params =
  new URLSearchParams(location.search);

const train =
  params.get('train') || '';

document.getElementById('train').textContent =
  train;

fetch(`/api/train-details?train=${encodeURIComponent(train)}`)
  .then(r => r.json())
  .then(data => {

    document.getElementById('status').textContent =
      'Status: ' + (data.status || '-');

    document.getElementById('lastStation').textContent =
      'Ostatnia potwierdzona stacja: ' +
      (data.lastConfirmedStation || '-');

    document.getElementById('lastTime').textContent =
      'Czas: ' +
      (data.lastConfirmedTime || '-');

    if (Array.isArray(data.route)) {

      document.getElementById('route').innerHTML =
        data.route.length
          ? data.route.join('<br>')
          : 'Brak danych';

    }

  });

</script>

</body>
</html>

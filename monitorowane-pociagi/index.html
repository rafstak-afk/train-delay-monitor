<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Monitor pociągów</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#101820;
  color:white;
  font-family:Arial,sans-serif;
}

h1{
  margin-top:0;
}

.info{
  margin-bottom:20px;
  opacity:.8;
}

.card{
  background:#1c2833;
  border:1px solid #34495e;
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
}

.ok{
  border-left:6px solid #2ecc71;
}

.missing{
  border-left:6px solid #e74c3c;
}

.train{
  font-size:24px;
  font-weight:bold;
}

.station{
  color:#8ec5ff;
  font-size:12px;
  font-weight:bold;
  margin-bottom:5px;
}

.delay{
  font-size:18px;
  font-weight:bold;
}

.green{
  color:#2ecc71;
}

.red{
  color:#e74c3c;
}
</style>

</head>
<body>

<h1>🚆 Monitor pociągów</h1>

<div id="info" class="info">Ładowanie...</div>

<div id="list"></div>

<script>

async function loadData() {

  const response =
    await fetch('/api/monitored-trains-v2');

  const data =
    await response.json();

  document.getElementById('info').innerHTML =
    `
    Znaleziono:
    <b>${data.foundCount}</b>
    z
    <b>${data.trainCount}</b>
    monitorowanych pociągów
    <br>
    Aktualizacja:
    ${new Date(data.generatedAt).toLocaleString('pl-PL')}
    `;

  document.getElementById('list').innerHTML =
    data.trains.map(t => {

      const cls =
        t.found ? 'ok' : 'missing';

      const delayClass =
        (t.delay || 0) > 0
          ? 'red'
          : 'green';

      return `
        <div class="card ${cls}">
          <div class="station">
            ${t.station}
          </div>

          <div class="train">
            ${t.train}
          </div>

          <div>
            ${t.name || '-'}
          </div>

          <div>
            ${t.destination || ''}
          </div>

          <div class="delay ${delayClass}">
            ${
              t.found
                ? `Opóźnienie: ${t.delay ?? 0} min`
                : 'NIE ZNALEZIONO'
            }
          </div>

          ${
            t.found
              ? `
              <div>Peron: ${t.platform || '-'}</div>
              <div>Tor: ${t.track || '-'}</div>
              `
              : ''
          }
        </div>
      `;
    }).join('');
}

loadData();

setInterval(
  loadData,
  60000
);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje pociągi</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#101820;color:white;padding:14px 14px 82px}
.wrap{max-width:900px;margin:0 auto}
h1{text-align:center;margin:12px 0}
.panel{background:#1c2833;border:1px solid #34495e;border-radius:16px;padding:14px;margin:12px 0}
.row{display:grid;grid-template-columns:1fr 120px auto;gap:8px}
input,button{border:0;border-radius:10px;padding:11px;font-size:15px}
button{font-weight:900;cursor:pointer}.refresh-mini{border:0;cursor:pointer}
.blue{background:#0b57d0;color:#fff}.green{background:#198754;color:#fff}.gray{background:#475569;color:#fff}.red{background:#dc3545;color:#fff}
.card{background:#102235;border:1px solid #31516f;border-radius:12px;padding:10px;margin:8px 0}
.card-row{display:grid;grid-template-columns:1fr 38px;gap:8px;align-items:center}
.card-refresh{width:34px;height:34px;border-radius:50%;background:#0f172a;border:1px solid #334155;color:#dbeafe;font-size:18px;font-weight:900;cursor:pointer}
.train{display:grid;grid-template-columns:86px 74px 1fr 34px;gap:8px;align-items:center}
.time{font-size:22px;font-weight:900;color:#5dd39e;text-align:left}
.delay{font-size:34px;font-weight:900;text-align:left;color:#5dd39e;line-height:1}
.delay.warn{color:#ffcc00}.delay.bad{color:#ff6b6b}.carrier{display:inline-flex;align-items:center;justify-content:center;min-width:52px;height:24px;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:900;margin-right:8px;letter-spacing:.3px}
.carrier.ks{background:linear-gradient(135deg,#facc15 0 18%,#22c55e 18% 38%,#0ea5e9 38% 58%,#1d4ed8 58% 78%,#111827 78%);color:white;text-shadow:0 1px 2px #000}
.carrier.ic{background:#111827;color:#fb923c;border:1px solid #fb923c;font-style:italic}
.carrier.pr{background:#111827;color:#ff4444;border:1px solid #ff4444}
.carrier.other{background:#334155;color:#dbeafe}.timeline-sub{display:block;margin-top:4px;padding-top:4px;border-top:1px solid rgba(147,197,253,.35);font-size:11px;font-weight:900;color:#93c5fd;text-align:center;white-space:nowrap}.refresh-mini{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:999px;background:#0f172a;border:1px solid #334155;color:#dbeafe;font-size:15px;font-weight:900}.card.hit{background:#0b1f35}.card.miss{border-color:#64748b;background:#111827}.card.bad{border-color:#ff6b6b}.card.warn{border-color:#ffcc00}
.station{font-size:12px;color:#93c5fd;font-weight:900;text-transform:uppercase}
.main{font-size:17px;font-weight:900}
.meta{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px}
.list{display:grid;gap:6px}.observed-summary{cursor:pointer;font-size:24px;font-weight:900;list-style:none}.observed-summary::-webkit-details-marker{display:none}.observed-summary:before{content:'▶ ';color:#93c5fd}.panel[open]>.observed-summary:before{content:'▼ ';color:#93c5fd}
.item{display:grid;grid-template-columns:1fr 90px auto;gap:8px;align-items:center;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:8px}
.bottom{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);width:min(660px,calc(100vw - 16px));background:rgba(22,36,51,.97);border:1px solid #34495e;border-radius:14px;padding:7px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.bottom a,.bottom button{display:flex;align-items:center;justify-content:center;height:36px;border-radius:9px;background:#f2f4f8;color:#111827;text-decoration:none;font-size:12px;font-weight:900}
@media(max-width:700px){.row{grid-template-columns:1fr}.item{grid-template-columns:1fr 80px auto}.train{grid-template-columns:72px 58px 1fr 30px}.time{font-size:18px}.delay{font-size:30px}.refresh-mini{width:28px;height:28px;font-size:14px}}
</style>
</head>
<body>
<div class="wrap">
<h1>⭐ Moje pociągi</h1>

<div class="panel">
  <div class="row">
    <input id="stationInput" placeholder="Stacja, np. Katowice">
    <input id="trainInput" placeholder="3814">
    <button class="green" onclick="addItem()">Dodaj</button>
  </div>
  <div class="meta" style="margin-top:8px">Dodajesz parę: stacja + numer pociągu. Bez zgadywania, bez klikania po pięciu tablicach jak w jakimś cyfrowym labiryncie.</div>
</div>

<details class="panel" id="observedBox">
  <summary class="observed-summary">Obserwowane <span id="observedCount">(0)</span></summary>
  <div id="items" class="list" style="margin-top:10px"></div>
</details>

<div class="panel">
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
    <button class="blue" onclick="loadMine()">Odśwież</button>
    <button class="gray" onclick="seed()">➕ Uzupełnij domyślne</button>
  </div>
  <div id="status" class="meta" style="text-align:center;margin-top:10px">Gotowe.</div>
</div>

<div class="panel">
  <h2>Wyniki</h2>
  <div id="results"><div class="meta">Brak danych.</div></div>
</div>
</div>

<div class="bottom">
  <a href="/">🚆 Tablica</a>
  <button onclick="loadMine()">⭐ Moje</button>
  <a href="/alarmy/">🔔 Alarmy</a>
</div>

<script>
const KEY='rafstakMojePociagiV01';
const SCROLL_KEY='mojePociagiScrollV01';

function today(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function norm(v){return String(v||'').trim()}
function getItems(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}}
function setItems(a){localStorage.setItem(KEY,JSON.stringify(a));renderItems()}
function setStatus(t){status.textContent=t}
function scrollToResults(){
  const first=results.querySelector('.card');
  const target=first||document.getElementById('results');
  if(target)target.scrollIntoView({behavior:'smooth',block:'start'});
}
function collapseObserved(){
  const box=document.getElementById('observedBox');
  if(box)box.open=false;
}
function shortTime(v){const m=String(v||'').match(/(\d{2}:\d{2})/);return m?m[1]:''}
function delayClass(d){d=Number(d||0);return d>=15?'delay bad':d>=5?'delay warn':'delay'}

function delayText(d){d=Number(d||0);return d>0?'+'+d:'0'}
function minutes(t){const m=String(t||'').match(/(\d{2}):(\d{2})/);return m?Number(m[1])*60+Number(m[2]):null}
function nowMinutes(){const n=new Date();return n.getHours()*60+n.getMinutes()}
function sortKey(row){
  if(!row.d)return 999999;
  const t=minutes(shortTime(row.d.time)||shortTime(row.d.plannedTime));
  if(t===null)return 999998;
  const now=nowMinutes();
  return t>=now ? t-now : 1440+(t-now);
}
function carrierBadge(d){
  const c=String(d.carrier||d.category||'').toUpperCase();
  if(c.includes('IC'))return '<span class="carrier ic">IC</span>';
  if(c.includes('PR'))return '<span class="carrier pr">PR</span>';
  if(c.includes('KŚ')||c.includes('KS'))return '<span class="carrier ks">KŚ</span>';
  return '<span class="carrier other">'+esc(c||'PKP')+'</span>';
}
function trainCategoryLine(d,item){
  const category=String(d.category||'').trim();
  const name=String(d.name||d.trainName||'').trim();
  const no=String(d.train||item.train||'').trim();
  return [category,name,no].filter(Boolean).join(' ');
}
function timeToDeparture(d){
  const t=minutes(shortTime(d.time)||shortTime(d.plannedTime));
  if(t===null)return '';
  let diff=t-nowMinutes();
  if(diff>=0)return 'za '+diff+' min';
  return Math.abs(diff)+' min temu';
}


function renderItems(){
  const arr=getItems();
  if(window.observedCount)observedCount.textContent='('+arr.length+')';
  items.innerHTML=arr.length?arr.map((x,i)=>`
    <div class="item">
      <div><b>${esc(x.station)}</b><div class="meta">${esc(x.label||'')}</div></div>
      <div><b>${esc(x.train)}</b></div>
      <button class="red" onclick="removeItem(${i})">×</button>
    </div>
  `).join(''):'<div class="meta">Brak obserwowanych pociągów.</div>';
}
function addItem(){
  const station=norm(stationInput.value), train=norm(trainInput.value).toUpperCase();
  if(!station||!train){setStatus('Podaj stację i numer pociągu.');return}
  const arr=getItems().filter(x=>!(x.station.toLowerCase()===station.toLowerCase()&&String(x.train)===train));
  arr.push({station,train});
  setItems(arr);
  stationInput.value='';trainInput.value='';
  loadMine();
}
function removeItem(i){const a=getItems();a.splice(i,1);setItems(a);loadMine()}
function seed(){
  setItems([
    {station:'Katowice',train:'3815'},
    {station:'Tarnowskie Góry',train:'40450'},
    {station:'Miasteczko Śląskie',train:'44226'},
    {station:'Tarnowskie Góry',train:'40250'},
    {station:'Chorzów Batory',train:'40658'},
    {station:'Chorzów Batory',train:'40423'},
    {station:'Katowice',train:'38107'},
    {station:'Katowice',train:'40621'},
    {station:'Chorzów Batory',train:'40211'},
    {station:'Chorzów Uniwersytet',train:'40468'}
  ]);
  loadMine();
}


const STATION_CACHE_KEY='mojePociagiStationCacheV01';
const STATION_CACHE_TTL=180000;
let lastDataSource='';
let dataSources=[];

function getStationCache(){
  try{
    return JSON.parse(localStorage.getItem(STATION_CACHE_KEY)||'{}');
  }catch{
    return {};
  }
}

function setStationCache(cache){
  localStorage.setItem(STATION_CACHE_KEY,JSON.stringify(cache));
}

async function fetchStation(station){

  const cache=getStationCache();
  const cached=cache[station];

  if(
    cached &&
    cached.time &&
    Date.now()-cached.time < STATION_CACHE_TTL &&
    Array.isArray(cached.data)
  ){
    const ageSec=Math.floor((Date.now()-cached.time)/1000);
    const cacheTime=new Date(cached.time).toLocaleTimeString('pl-PL');

    dataSources.push(
      `⚡ ${station}: cache z ${cacheTime} (${ageSec}s temu)`
    );

    return cached.data;
  }

  const params=new URLSearchParams({
    station,
    date:today(),
    limit:'300'
  });

  let departures=[];

  try{

    const r=await fetch('/api/departures?'+params.toString(),{
      headers:{Accept:'application/json'}
    });

    const data=await r.json();

    if(Array.isArray(data.departures)){
      departures=data.departures.map(x=>({
        ...x,
        _station:data.station?.name || station,
        _stationId:data.station?.id || '',
        _date:data.date || today()
      }));
    }

  }catch(e){

    console.warn('Błąd pobierania stacji',station,e);

    if(cached?.data){
      return cached.data;
    }

  }

  const map=new Map();

  for(const d of departures){

    const trainNo=String(
      d.train ||
      d.trainNumber ||
      d.number ||
      d.trainNo ||
      ''
    ).trim();

    const key=[
      d._station,
      trainNo,
      d.plannedTime,
      d.time,
      d.destination
    ].join('|');

    if(trainNo){
      map.set(key,{...d,train:trainNo});
    }
  }

  const result=[...map.values()];

  cache[station]={
    time:Date.now(),
    data:result
  };

  setStationCache(cache);
  const apiTime=new Date().toLocaleTimeString('pl-PL');

  dataSources.push(
    `🟢 ${station}: API PLK ${apiTime}`
  );

  return result;
}

function trainUrl(d){
  const p=new URLSearchParams();
  p.set('train',d.train||'');
  if(d.category)p.set('category',d.category);
  if(d.name)p.set('name',d.name);
  if(d.destination)p.set('destination',d.destination);
  p.set('date',d._date||today());

  const scheduleId=d.scheduleId||d.scheduledId||d.scheduleID||'';
  const orderId=d.orderId||d.orderID||'';
  const trainOrderId=d.trainOrderId||d.trainOrderID||'';

  if(scheduleId){
    p.set('scheduleId',scheduleId);
    p.set('scheduledId',scheduleId);
  }
  if(orderId)p.set('orderId',orderId);
  if(trainOrderId)p.set('trainOrderId',trainOrderId);
  if(d._stationId)p.set('stationId',d._stationId);
  if(d._station)p.set('station',d._station);

  return '/train?'+p.toString();
}

function cardFor(item,d){
  if(!d){
    return `<div class="card-row" data-station="${esc(item.station)}" data-train="${esc(item.train)}">
      <div class="card miss">
        <div class="station">${esc(item.station)}</div>
        <div class="train">
          <div class="delay bad">?</div>
          <div><div class="time">—</div><div class="timeline-sub">brak</div></div>
          <div><div class="main">${esc(item.train)}</div><div class="meta">Nie znaleziono w tablicy</div></div>
        </div>
      </div>
      <button type="button" class="card-refresh" onclick="refreshOne('${esc(item.station)}','${esc(item.train)}')">↻</button>
    </div>`;
  }

  const delay=Number(d.delay||0);
  const cls=delay>=15?'card hit bad':delay>=5?'card hit warn':'card hit';

  return `<div class="card-row" data-station="${esc(item.station)}" data-train="${esc(item.train)}">
    <a href="${esc(trainUrl(d))}" style="color:inherit;text-decoration:none">
      <div class="${cls}">
        <div class="station">${esc(item.station)}</div>
        <div class="train">
          <div class="${delayClass(delay)}">${esc(delayText(delay))}</div>
          <div>
            <div class="time">${esc(shortTime(d.time)||shortTime(d.plannedTime)||'—')}</div>
            <div class="timeline-sub">${esc(timeToDeparture(d))}</div>
          </div>
          <div>
            <div class="main">${carrierBadge(d)}${esc(trainCategoryLine(d,item))}</div>
            <div class="meta"><b style="color:white">${esc(d.destination||'')}</b></div>
            <div class="meta">${esc(d.via?'przez: '+d.via:'')}</div>
            <div class="meta">peron ${esc(d.platform||'—')} · tor ${esc(d.track||'—')} · ${esc(d.carrier||'')}</div>
          </div>
        </div>
      </div>
    </a>
    <button type="button" class="card-refresh" onclick="refreshOne('${esc(item.station)}','${esc(item.train)}')">↻</button>
  </div>`;
}

async function refreshOne(station,train){
  setStatus(`Odświeżam ${station} ${train}...`);

  dataSources=[];

  const rows=await fetchStation(station);

  const hit=rows.find(d =>
    String(d.train||d.trainNumber||d.number||d.trainNo||'').trim()
    === String(train).trim()
  );

  const row=document.querySelector(
    `.card-row[data-station="${CSS.escape(station)}"][data-train="${CSS.escape(train)}"]`
  );

  if(row){
    row.outerHTML=cardFor(
      {station,train},
      hit
    );
  }

  setStatus(
    'Gotowe: '+
    new Date().toLocaleTimeString('pl-PL')+
    ' · DS='+
    JSON.stringify(dataSources)
  );
}

async function loadMine(){
  lastDataSource='';
  dataSources=[];
  const arr=getItems();
  if(!arr.length){results.innerHTML='<div class="meta">Dodaj pierwszy pociąg.</div>';return}
  setStatus('Pobieram wybrane stacje...');
  results.innerHTML='<div class="meta">Ładowanie...</div>';
  const stations=[...new Set(arr.map(x=>x.station))];
  const byStation={};
  await Promise.all(stations.map(async st=>{byStation[st]=await fetchStation(st)}));
  const prepared=arr.map(item=>{
    const rows=byStation[item.station]||[];
    const hit=rows.find(d=>String(d.train||d.trainNumber||d.number||d.trainNo||'').trim()===String(item.train).trim());
    return {item,d:hit};
  }).sort((a,b)=>sortKey(a)-sortKey(b));
  const html=prepared.map(x=>cardFor(x.item,x.d)).join('');
  results.innerHTML=html;
  collapseObserved();
  lastDataSource=[...new Set(dataSources)].join(' | ');
  setStatus(
    'Gotowe: '+
    new Date().toLocaleTimeString('pl-PL')+
    ' · DS='+
    JSON.stringify(dataSources)
  );
  setTimeout(scrollToResults,120);
}

function defaultItems(){
  return [
    {station:'Katowice',train:'3815'},
    {station:'Tarnowskie Góry',train:'40450'},
    {station:'Miasteczko Śląskie',train:'44226'},
    {station:'Tarnowskie Góry',train:'40250'},
    {station:'Chorzów Batory',train:'40658'},
    {station:'Chorzów Batory',train:'40423'},
    {station:'Katowice',train:'38107'},
    {station:'Katowice',train:'40621'},
    {station:'Chorzów Batory',train:'40211'},
    {station:'Chorzów Uniwersytet',train:'40468'}
  ];
}

document.addEventListener('DOMContentLoaded',()=>{
  if(!getItems().length){
    setItems(defaultItems());
  }
  renderItems();
  loadMine();
});


window.addEventListener('scroll',()=>{
  sessionStorage.setItem(SCROLL_KEY,String(window.scrollY));
},{passive:true});

window.addEventListener('pageshow',()=>{
  const y=sessionStorage.getItem(SCROLL_KEY);
  if(y){
    requestAnimationFrame(()=>{
      window.scrollTo(0,Number(y));
    });
  }
});

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<!-- app-version: alarmy-v0.2.3 train-run-local-view -->
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bieg pociągu</title>
<style>
:root{--bg:#101820;--panel:#1c2833;--card:#223244;--border:#34495e;--muted:rgba(255,255,255,.68);--ok:#5dd39e;--bad:#ff6b6b;--yellow:#ffcc00;--blue:#93c5fd}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:#fff;padding:18px}.wrap{max-width:1050px;margin:0 auto}h1{text-align:center;margin:10px 0 4px}.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:14px}.panel,.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px;margin:12px 0}.card{background:var(--card)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.field{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:8px;font-size:13px}.field b{color:#fff}.muted{color:var(--muted);font-size:12px}.badge{display:inline-block;border-radius:999px;padding:5px 10px;font-weight:900;font-size:12px;background:#334155}.bad{background:#7f1d1d}.ok{background:#166534}.warn{background:#854d0e}.time{font-size:28px;color:var(--ok);font-weight:900}.route{display:grid;gap:7px;margin-top:10px}.stop{display:grid;grid-template-columns:90px 1fr 110px;gap:10px;align-items:center;background:#162433;border:1px solid #2f4358;border-radius:12px;padding:9px}.stop .name{font-weight:900}.raw{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.raw .field{overflow-wrap:anywhere}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}.actions a,.actions button{border:0;border-radius:10px;padding:10px 12px;font-weight:900;text-decoration:none;background:#f2f4f8;color:#111827;cursor:pointer}.error{border-color:#ef4444;background:#3b1d1d}@media(max-width:720px){body{padding:10px}.grid,.raw{grid-template-columns:1fr}.stop{grid-template-columns:66px 1fr 74px}.time{font-size:22px}}
</style>
</head>
<body>
<div class="wrap">
<h1 id="title">Bieg pociągu</h1>
<div class="sub" id="subtitle">Ładowanie danych...</div>
<div class="actions"><a href="./index.html">← Alarmy</a><button onclick="reloadData()">Odśwież</button></div>
<div id="out"><div class="panel">Ładowanie...</div></div>
</div>
<script>
const qs=new URLSearchParams(location.search);
const train=qs.get('train')||qs.get('number')||'';
const station=qs.get('station')||'';
const date=qs.get('date')||new Date().toISOString().slice(0,10);
const cacheKey=qs.get('cacheKey')||'';
const sourceLink=qs.get('sourceLink')||'';
const runId=qs.get('runId')||qs.get('courseId')||qs.get('journeyId')||qs.get('trainId')||qs.get('operationId')||qs.get('scheduleId')||qs.get('id')||'';
document.addEventListener('DOMContentLoaded',reloadData);
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function norm(v){return String(v??'').trim().replace(/[^0-9A-Za-z-]/g,'').toUpperCase()}
function valOf(d,names){for(const n of names){if(d&&d[n]!==undefined&&d[n]!==null&&String(d[n]).trim()!=='')return d[n]}return''}
function shortTime(v){if(!v)return'';const m=String(v).match(/(\d{2}:\d{2})/);return m?m[1]:v}
function trainNoOf(d){return norm(valOf(d,['train','trainNumber','number','trainNo','commercialTrainNumber','train_number']))}
function codeOf(d){const vals=[d.statusCode,d.status,d.trainStatus,d.operationStatus,d.operationalStatus,d.plkStatus,d.plkCode,d.realizationStatus,d.runStatus,d.cancellationStatus,d.state,d.code,d.kodPLK,d.plkKod];for(const v of vals){const s=String(v??'').trim().toUpperCase();if(s==='X'||s.includes('ODWO')||s.includes('CANCEL')||s.includes('ANNUL'))return 'X'}return''}
function statusText(d){if(codeOf(d)==='X')return 'ODWOŁANY';return String(valOf(d,['status','trainStatus','operationStatus','realizationStatus','state'])||'OK')}
function delayOf(d){for(const k of ['delay','delayMinutes','delayed','late','delayInMinutes']){const n=Number(d&&d[k]);if(Number.isFinite(n))return n}return 0}
function detailLinkOf(d){return String(valOf(d,['detailsUrl','trainUrl','runUrl','url','href','link'])||'')}
function idOf(d){return String(valOf(d,['runId','courseId','journeyId','journey_id','trainId','train_id','timetableId','timetable_id','operationId','operation_id','scheduleId','schedule_id','relationId','relation_id','id','uid'])||runId||'')}
function stopName(s){return String(valOf(s,['station','stationName','name','stop','stopName','location'])||'').trim()}
function routeStopsOf(d){const c=[d.route,d.stops,d.timetable,d.trainStops,d.stationStops,d.schedule,d.path,d.relation].filter(Array.isArray);for(const arr of c){const names=arr.map(stopName).filter(Boolean);if(names.length)return names}const raw=valOf(d,['via','routeText','route','relationText']);if(raw&&typeof raw==='string')return raw.split(/\s*(?:,|→|->| - )\s*/).filter(Boolean);return[]}
async function fetchJson(url){const r=await fetch(url,{headers:{Accept:'application/json'}});let data={};try{data=await r.json()}catch{}if(!r.ok)throw new Error(data.error||data.details||data.message||('HTTP '+r.status));return data}
function getCached(){try{const raw=sessionStorage.getItem(cacheKey);if(!raw)return null;const x=JSON.parse(raw);return x&&x.row?x.row:null}catch{return null}}
function normalizeTrainDetail(data){if(!data||typeof data!=='object')return null;const src=data.train||data.details||data.data||data.result||data.run||data;const rows=[...(Array.isArray(src)?src:[src])].filter(Boolean);return rows.find(x=>trainNoOf(x)===norm(train))||rows[0]||null}
async function apiTrain(){const urls=[];const base={train,date,station,runId,sourceLink};for(const key of ['train','number','trainNo']){const p=new URLSearchParams();p.set(key,train);if(date)p.set('date',date);if(station)p.set('station',station);if(runId)p.set('runId',runId);if(sourceLink)p.set('link',sourceLink);urls.push('/api/train?'+p.toString())}if(sourceLink)urls.push(sourceLink);for(const u of urls){try{const data=await fetchJson(u);const d=normalizeTrainDetail(data);if(d)return {...d,_source:'szczegóły /api/train'};}catch(e){console.warn('apiTrain failed',u,e)}}return null}
async function stationSearch(){if(!station)return null;const slots=['00:00','04:00','08:00','12:00','16:00','20:00'];for(const time of slots){const p=new URLSearchParams({station,date,time,limit:'300'});try{const data=await fetchJson('/api/departures?'+p.toString());const arr=Array.isArray(data.departures)?data.departures:[];const hit=arr.find(d=>trainNoOf(d)===norm(train));if(hit)return {...hit,_source:'tablica stacji /api/departures'};}catch(e){console.warn('stationSearch failed',time,e)}}return null}
async function reloadData(){title.textContent='Pociąg '+esc(train);subtitle.textContent=[station,date,runId?'ID '+runId:''].filter(Boolean).join(' · ');out.innerHTML='<div class="panel">Szukam danych biegu...</div>';try{const cached=getCached();const fromApi=await apiTrain();const fromBoard=fromApi?null:await stationSearch();const row={...(cached||{}),...(fromBoard||{}),...(fromApi||{})};if(!Object.keys(row).length)throw new Error('Nie znalazłem danych pociągu w /api/train ani w tablicy stacji.');render(row,cached,fromApi,fromBoard)}catch(e){out.innerHTML='<div class="panel error"><b>Błąd:</b> '+esc(e.message)+'<p class="muted">To oznacza, że trzeba poprawić worker albo mapowanie linku z tablicy. Sam numer pociągu nie zawsze wystarczy, bo PLK potrafi mieć kilka kursów o tym samym numerze. Informatyczna ruletka, tylko bez kasyna.</p></div>'}}
function render(row,cached,fromApi,fromBoard){const delay=delayOf(row), status=statusText(row), stops=routeStopsOf(row), id=idOf(row);const origin=valOf(row,['origin','from','startStation','stationFrom','departureStation'])||stops[0]||'';const dest=valOf(row,['destination','to','direction','targetStation','endStation','finalStation','stationTo','destinationStation'])||stops[stops.length-1]||'';const badge=status==='ODWOŁANY'?'bad':(delay>0?'warn':'ok');let html='<div class="card"><div class="grid">';html+=field('Numer',trainNoOf(row)||train);html+=field('Status',`<span class="badge ${badge}">${esc(status)}</span>`);html+=field('Plan',shortTime(valOf(row,['plannedTime','scheduledTime','time','departureTime','arrivalTime']))||'—');html+=field('Rzeczywisty',shortTime(valOf(row,['actualTime','realTime','time','departureTime']))||'—');html+=field('Opóźnienie',delay>0?'+'+delay+' min':'0');html+=field('Peron / tor',(valOf(row,['platform','peron','platformNumber'])||'—')+' / '+(valOf(row,['track','tor','trackNumber'])||'—'));html+=field('Relacja',(origin||'—')+' → '+(dest||'—'));html+=field('Przewoźnik',valOf(row,['carrier','operator','company','railwayUndertaking','undertaking','przewoznik'])||'—');html+=field('Nazwa',valOf(row,['name','trainName'])||'—');html+=field('Identyfikator kursu',id||'brak w danych');html+=field('Link z tablicy',detailLinkOf(row)||sourceLink||'brak');html+=field('Źródło',row._source||'cache / dane mieszane');html+='</div></div>';if(stops.length){html+='<div class="card"><h2>Trasa</h2><div class="route">'+stops.map((s,i)=>`<div class="stop"><div class="time">${i+1}</div><div class="name">${esc(s)}</div><div class="muted">${i===0?'start':i===stops.length-1?'koniec':''}</div></div>`).join('')+'</div></div>'}html+='<div class="card"><h2>Surowe pola z API</h2><div class="raw">'+Object.entries(row).filter(([k,v])=>v!==null&&v!==undefined&&typeof v!=='object'&&String(v).trim()!=='').map(([k,v])=>field(k,String(v).slice(0,500))).join('')+'</div></div>';out.innerHTML=html}
function field(k,v){return `<div class="field"><b>${esc(k)}:</b> ${String(v).startsWith('<span')?v:esc(v)}</div>`}
</script>
</body>
</html>

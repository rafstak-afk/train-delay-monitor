<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Przekierowanie do biegu pociągu</title><style>body{font-family:Arial,sans-serif;background:#101820;color:#fff;padding:30px}a{color:#93c5fd}.box{max-width:720px;margin:40px auto;background:#1c2833;border:1px solid #34495e;border-radius:16px;padding:18px}</style></head><body><div class="box"><h1>Przekierowuję do biegu pociągu...</h1><p>Ten techniczny podgląd został wyłączony. Numer pociągu ma otwierać właściwy widok biegu.</p><p><a id="lnk" href="/train.html">Otwórz ręcznie</a></p></div><script>const qs=new URLSearchParams(location.search);const p=new URLSearchParams();['train','number','date','station','runId','courseId','journeyId','trainId','operationId','scheduleId','connectionId','communicationId','link','sourceLink','url'].forEach(k=>{const v=qs.get(k);if(v)p.set(k,v)});const href='/train.html?'+p.toString();document.getElementById('lnk').href=href;location.replace(href);</script></body></html>

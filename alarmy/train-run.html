<!DOCTYPE html>
<html lang="pl">
<!-- app-version: alarmy-v0.3.2 train-run-real-view -->
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bieg pociągu</title>
<style>
:root{--bg:#101820;--panel:#1c2833;--card:#223244;--border:#34495e;--muted:rgba(255,255,255,.68);--ok:#5dd39e;--bad:#ff6b6b;--yellow:#ffcc00;--blue:#93c5fd}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:#fff;padding:18px}.wrap{max-width:1050px;margin:0 auto}h1{text-align:center;margin:10px 0 4px}.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:14px}.panel,.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px;margin:12px 0}.card{background:var(--card)}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}.actions a,.actions button{border:0;border-radius:10px;padding:10px 12px;font-weight:900;text-decoration:none;background:#f2f4f8;color:#111827;cursor:pointer}.actions .blue{background:#2563eb;color:#fff}.summary{display:grid;grid-template-columns:1.2fr .8fr .8fr .8fr;gap:8px}.box{background:#0f172a;border:1px solid #334155;border-radius:12px;padding:10px;font-size:13px}.box b{display:block;color:#93c5fd;margin-bottom:4px}.badge{display:inline-block;border-radius:999px;padding:5px 10px;font-weight:900;font-size:12px;background:#334155}.bad{background:#7f1d1d}.ok{background:#166534}.warn{background:#854d0e}.route{display:grid;gap:7px;margin-top:10px}.stop{display:grid;grid-template-columns:92px 1fr 120px;gap:10px;align-items:center;background:#162433;border:1px solid #2f4358;border-radius:12px;padding:9px}.stop .clock{font-size:20px;color:var(--ok);font-weight:900}.stop .name{font-weight:900}.stop .meta{color:var(--muted);font-size:12px;text-align:right}.muted{color:var(--muted);font-size:12px}.error{border-color:#ef4444;background:#3b1d1d}.note{background:#0f172a;border:1px dashed #475569;border-radius:12px;padding:12px;color:#dbeafe;line-height:1.35}.technical summary{cursor:pointer;font-weight:900}.raw{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:10px}.raw .box{overflow-wrap:anywhere}@media(max-width:760px){body{padding:10px}.summary,.raw{grid-template-columns:1fr}.stop{grid-template-columns:66px 1fr 76px}.stop .clock{font-size:18px}}
</style>
</head>
<body>
<div class="wrap">
<h1 id="title">Bieg pociągu</h1>
<div class="sub" id="subtitle">Ładowanie danych...</div>
<div class="actions"><a href="./index.html">← Alarmy</a><button onclick="reloadData()">Odśwież</button><a id="externalLink" class="blue" href="#" target="_blank" rel="noopener" style="display:none">Otwórz źródło PLK</a></div>
<div id="out"><div class="panel">Ładowanie...</div></div>
</div>
<script>
const qs=new URLSearchParams(location.search);
const train=qs.get('train')||qs.get('number')||'';
const station=qs.get('station')||'';
const date=qs.get('date')||new Date().toISOString().slice(0,10);
const cacheKey=qs.get('cacheKey')||'';
const sourceLink=qs.get('sourceLink')||'';
const runId=qs.get('runId')||qs.get('courseId')||qs.get('journeyId')||qs.get('trainId')||qs.get('operationId')||qs.get('scheduleId')||qs.get('connectionId')||qs.get('communicationId')||'';
document.addEventListener('DOMContentLoaded',reloadData);
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function norm(v){return String(v??'').trim().replace(/[^0-9A-Za-z-]/g,'').toUpperCase()}
function isGoodRunId(v){const s=String(v??'').trim();return !!s&&!/^20\d{2}$/.test(s)&&!/^\d{1,3}$/.test(s)}
function valOf(d,names){for(const n of names){if(d&&d[n]!==undefined&&d[n]!==null&&String(d[n]).trim()!=='')return d[n]}return''}
function shortTime(v){if(!v)return'';const m=String(v).match(/(\d{2}:\d{2})/);return m?m[1]:v}
function trainNoOf(d){return norm(valOf(d,['train','trainNumber','number','trainNo','commercialTrainNumber','train_number','communicationNumber','operationNumber']))}
function codeOf(d){const vals=[d.statusCode,d.status,d.trainStatus,d.operationStatus,d.operationalStatus,d.plkStatus,d.plkCode,d.realizationStatus,d.runStatus,d.cancellationStatus,d.state,d.code,d.kodPLK,d.plkKod];for(const v of vals){const s=String(v??'').trim().toUpperCase();if(s==='X'||s.includes('ODWO')||s.includes('CANCEL')||s.includes('ANNUL'))return 'X'}return''}
function statusText(d){if(codeOf(d)==='X')return 'ODWOŁANY';return String(valOf(d,['status','trainStatus','operationStatus','realizationStatus','state'])||'OK')}
function delayOf(d){for(const k of ['delay','delayMinutes','delayed','late','delayInMinutes']){const n=Number(d&&d[k]);if(Number.isFinite(n))return n}return 0}
function detailLinkOf(d){return String(valOf(d,['detailsUrl','trainUrl','runUrl','url','href','link'])||sourceLink||'')}
function idOf(d){const keys=['runId','courseId','journeyId','journey_id','trainId','train_id','timetableId','timetable_id','operationId','operation_id','scheduleId','schedule_id','connectionId','connection_id','communicationId','communication_id','uid'];for(const k of keys){const v=d&&d[k];if(isGoodRunId(v))return String(v)}return isGoodRunId(runId)?runId:''}
function stopName(s){return String(valOf(s,['station','stationName','name','stop','stopName','location'])||'').trim()}
function stopTime(s){return shortTime(valOf(s,['time','plannedTime','scheduledTime','departureTime','arrivalTime','arr','dep','arrival','departure']))}
function routeStopsDetailed(d){
  const arrays=[d.route,d.stops,d.timetable,d.trainStops,d.stationStops,d.schedule,d.path,d.relation].filter(Array.isArray);
  for(const arr of arrays){const stops=arr.map(x=>({name:stopName(x),time:stopTime(x),platform:valOf(x,['platform','peron']),track:valOf(x,['track','tor'])})).filter(x=>x.name);if(stops.length)return stops}
  const raw=valOf(d,['via','routeText','route','relationText']);
  if(raw&&typeof raw==='string')return raw.split(/\s*(?:,|→|->| - )\s*/).filter(Boolean).map(name=>({name,time:'',platform:'',track:''}));
  const from=valOf(d,['origin','from','startStation','stationFrom','departureStation']);
  const to=valOf(d,['destination','to','direction','targetStation','endStation','finalStation','stationTo','destinationStation']);
  return [from,to].filter(Boolean).map(name=>({name,time:'',platform:'',track:''}));
}
async function fetchJson(url){const r=await fetch(url,{headers:{Accept:'application/json'}});let data={};try{data=await r.json()}catch{}if(!r.ok)throw new Error(data.error||data.details||data.message||('HTTP '+r.status));return data}
function getCached(){try{const raw=sessionStorage.getItem(cacheKey);if(!raw)return null;const x=JSON.parse(raw);return x&&x.row?{...x.row,_source:'cache tablicy alarmów'}:null}catch{return null}}
function normalizeTrainDetail(data){if(!data||typeof data!=='object')return null;const src=data.train||data.details||data.data||data.result||data.run||data;const rows=[...(Array.isArray(src)?src:[src])].filter(Boolean);return rows.find(x=>trainNoOf(x)===norm(train))||rows[0]||null}
async function apiTrain(){
  const urls=[];
  const add=(p)=>urls.push('/api/train?'+p.toString());
  if(isGoodRunId(runId)){let p=new URLSearchParams({train,date,station,runId});add(p)}
  if(sourceLink){let p=new URLSearchParams({train,date,station,link:sourceLink});add(p)}
  for(const key of ['train','number','trainNo']){let p=new URLSearchParams();p.set(key,train);if(date)p.set('date',date);if(station)p.set('station',station);add(p)}
  for(const u of urls){try{const data=await fetchJson(u);const d=normalizeTrainDetail(data);if(d)return {...d,_source:'pełny bieg z /api/train'}}catch(e){console.warn('apiTrain failed',u,e)}}
  return null;
}
async function stationSearch(){
  if(!station)return null;
  const slots=['00:00','04:00','08:00','12:00','16:00','20:00'];
  for(const time of slots){const p=new URLSearchParams({station,date,time,limit:'300'});try{const data=await fetchJson('/api/departures?'+p.toString());const arr=Array.isArray(data.departures)?data.departures:[];const hit=arr.find(d=>trainNoOf(d)===norm(train));if(hit)return {...hit,_source:'tablica stacji /api/departures'}}catch(e){console.warn('stationSearch failed',time,e)}}
  return null;
}
async function reloadData(){
  title.textContent='Bieg pociągu '+esc(train);
  subtitle.textContent=[station,date,isGoodRunId(runId)?'ID '+runId:''].filter(Boolean).join(' · ');
  out.innerHTML='<div class="panel">Szukam pełnego biegu pociągu...</div>';
  if(sourceLink){externalLink.href=sourceLink;externalLink.style.display='inline-block'}else externalLink.style.display='none';
  try{
    const cached=getCached();
    const fromApi=await apiTrain();
    const fromBoard=fromApi?null:await stationSearch();
    const row={...(cached||{}),...(fromBoard||{}),...(fromApi||{})};
    if(!Object.keys(row).length)throw new Error('Nie znalazłem biegu pociągu ani pozycji w tablicy.');
    render(row,!!fromApi);
  }catch(e){out.innerHTML='<div class="panel error"><b>Błąd:</b> '+esc(e.message)+'<p class="muted">Jeżeli w alarmach był tylko numer bez linku/ID kursu, pełny bieg nie powstanie z powietrza. Magia nadal nie jest endpointem API.</p></div>'}
}
function box(k,v){return `<div class="box"><b>${esc(k)}</b>${String(v).startsWith('<span')?v:esc(v)}</div>`}
function render(row,fullRun){
  const delay=delayOf(row), status=statusText(row), stops=routeStopsDetailed(row), id=idOf(row), dl=detailLinkOf(row);
  const badge=status==='ODWOŁANY'?'bad':(delay>0?'warn':'ok');
  const origin=stops[0]?.name||valOf(row,['origin','from','startStation','stationFrom','departureStation'])||'—';
  const dest=stops[stops.length-1]?.name||valOf(row,['destination','to','direction','targetStation','endStation','finalStation','stationTo','destinationStation'])||'—';
  const plan=shortTime(valOf(row,['plannedTime','scheduledTime','time','departureTime','arrivalTime']))||'—';
  const real=shortTime(valOf(row,['actualTime','realTime','time','departureTime']))||'—';
  let html='<div class="card"><div class="summary">';
  html+=box('Pociąg',[valOf(row,['category','trainCategory','type']),trainNoOf(row)||train,valOf(row,['name','trainName'])].filter(Boolean).join(' '));
  html+=box('Status',`<span class="badge ${badge}">${esc(status)}</span>`);
  html+=box('Relacja',origin+' → '+dest);
  html+=box('Opóźnienie',status==='ODWOŁANY'?'ODWOŁANY':(delay>0?'+'+delay+' min':'0'));
  html+=box('Plan / rzeczywisty',plan+' / '+real);
  html+=box('Peron / tor',(valOf(row,['platform','peron','platformNumber'])||'—')+' / '+(valOf(row,['track','tor','trackNumber'])||'—'));
  html+=box('Przewoźnik',valOf(row,['carrier','operator','company','railwayUndertaking','undertaking','przewoznik'])||'—');
  html+=box('Źródło',row._source||'dane z alarmów');
  html+='</div></div>';
  if(!fullRun)html+='<div class="note">Mam pozycję z tablicy, ale nie pełny bieg z API. Jeżeli tablica nie przekazała prawdziwego linku/ID kursu, pokażę tylko relację i dane odjazdu. Czyli nie nekrolog, ale też jeszcze nie pełna karta pacjenta.</div>';
  if(stops.length){
    html+='<div class="card"><h2>Trasa / bieg pociągu</h2><div class="route">'+stops.map((s,i)=>`<div class="stop"><div class="clock">${esc(s.time||'—')}</div><div><div class="name">${esc(s.name)}</div><div class="muted">${i===0?'początek':i===stops.length-1?'koniec':'postój pośredni'}</div></div><div class="meta">${s.platform?'per. '+esc(s.platform):''}${s.track?' / tor '+esc(s.track):''}</div></div>`).join('')+'</div></div>';
  }else{
    html+='<div class="card error"><b>Brak listy postojów.</b><p class="muted">Dane tablicy nie zawierają pełnego biegu. Potrzebny jest prawdziwy link/identyfikator kursu z tablicy PLK albo poprawka w workerze, która z niego korzysta.</p></div>';
  }
  html+='<details class="card technical"><summary>Dane techniczne</summary><div class="raw">';
  html+=box('Identyfikator kursu',id||'brak');
  html+=box('Link z tablicy',dl||'brak');
  Object.entries(row).filter(([k,v])=>v!==null&&v!==undefined&&typeof v!=='object'&&String(v).trim()!=='').slice(0,24).forEach(([k,v])=>{html+=box(k,String(v).slice(0,500))});
  html+='</div></details>';
  out.innerHTML=html;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Przebieg pociągu</title><style>
body{margin:0;font-family:Arial,sans-serif;background:#101820;color:white;padding:18px}.wrap{max-width:900px;margin:0 auto}.top{display:flex;gap:10px;align-items:center;margin-bottom:14px}.btn{background:#0b57d0;color:#fff;border:0;border-radius:10px;padding:10px 14px;text-decoration:none;font-weight:700}.card{background:#1c2833;border:1px solid #34495e;border-radius:14px;padding:14px;margin:10px 0}.muted{opacity:.7}.station{display:grid;grid-template-columns:80px 1fr auto;gap:10px;border-bottom:1px solid #34495e;padding:10px 0}.station:last-child{border-bottom:0}.passed{color:#5dd39e;font-weight:700}.now{color:#ffcc00;font-weight:800}.err{background:#3b1d1d;border:1px solid #dc3545;color:#ffd6d6;border-radius:12px;padding:12px}@media(max-width:650px){body{padding:10px}.station{grid-template-columns:62px 1fr}.station .status{grid-column:2}.top{flex-wrap:wrap}h1{font-size:22px}}
</style></head><body><div class="wrap"><div class="top"><a class="btn" href="/">← Tablica</a><button class="btn" onclick="loadTrain()">Odśwież</button></div><h1 id="title">Przebieg pociągu</h1><div id="meta" class="muted"></div><div id="content" class="card">Pobieram dane…</div></div><script>
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function hh(v){if(!v)return'';const m=String(v).match(/(\d{2}:\d{2})/);return m?m[1]:v}
function stationName(s){return s.stationName||s.name||s.stopName||('Stacja ID '+(s.stationId??''))}
async function loadTrain(){const params=new URLSearchParams(location.search);title.textContent='Przebieg: '+(params.get('train')||'pociąg');meta.textContent=params.get('name')||'';content.textContent='Pobieram dane…';try{const q=new URLSearchParams();['date','scheduleId','orderId','trainOrderId'].forEach(k=>{if(params.get(k))q.set(k,params.get(k))});const res=await fetch('/api/debug-train?'+q.toString(),{headers:{Accept:'application/json'}});const data=await res.json();if(!res.ok)throw new Error(data.error||data.details||'HTTP '+res.status);render(data)}catch(e){content.innerHTML='<div class="err">Błąd pobierania przebiegu: '+esc(e.message)+'</div>'}}
function render(data){const route=(data.route&&data.route.stations)||[];const ops=(data.operation&&data.operation.stations)||[];const opById=new Map(ops.map(o=>[String(o.stationId),o]));let lastPassed='';const rows=route.map((s,i)=>{const op=opById.get(String(s.stationId))||{};const arr=op.actualArrival||op.plannedArrival||s.arrivalTime||'';const dep=op.actualDeparture||op.plannedDeparture||s.departureTime||'';const planned=s.departureTime||s.arrivalTime||op.plannedDepartureTime||op.plannedArrivalTime||'';const actual=op.actualDeparture||op.actualArrival||'';const passed=!!(op.actualDeparture||op.actualArrival||op.isConfirmed);if(passed)lastPassed=stationName(s);const status=passed?'zaliczona':'plan';return `<div class="station"><div><b>${esc(hh(actual||planned))}</b><div class="muted">${esc(hh(planned))}</div></div><div><b>${esc(stationName(s))}</b><div class="muted">peron ${esc(s.departurePlatform||s.arrivalPlatform||'')} tor ${esc(s.departureTrack||s.arrivalTrack||'')}</div></div><div class="status ${passed?'passed':''}">${status}</div></div>`}).join('');content.innerHTML=`<div class="muted">Ostatnia zaliczona stacja: <b>${esc(lastPassed||'brak danych')}</b></div><div style="height:8px"></div>${rows||'<div class="muted">Brak przebiegu.</div>'}`}
loadTrain();
</script></body></html>

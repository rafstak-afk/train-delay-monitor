<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Transport GZM">
  <title>Rozkłady TGZM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f0; --surface: #ffffff;
      --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
      --text: #1a1a18; --text2: #6b6b66; --text3: #a0a09a;
      --accent: #b8860b; --red: #c0392b; --green: #2e7d32;
      --tgzm: #f5c000; --tgzm-dark: #1a1a18;
      --mono: 'Share Tech Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    body { font-family: var(--sans); background: #0a0a0a; color: #ff9500; min-height: 100vh; }
    header {
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid #222;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      position: sticky; top: 0; background: #0a0a0a; z-index: 10;
    }
    .header-left h1 { font-size: 16px; font-weight: 600; color: #ff9500; letter-spacing: 0.05em; }
    .header-left p  { font-size: 11px; color: #555; margin-top: 2px; font-family: var(--mono); }
    .btn {
      background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
      color: #ff9500; font-family: var(--sans); font-size: 12px;
      padding: 0.4rem 0.7rem; cursor: pointer;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .spin { display: inline-block; }
    .loading .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .container { padding: 0 0.5rem 1rem; max-width: 1400px; margin: 0 auto; }
    .boards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 0.75rem;
      margin-top: 0.75rem;
    }
    .stop-block {
      background: #111; border: 1px solid #2a2a2a; border-radius: 8px;
      overflow: hidden;
    }
    .stop-header {
      background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
      padding: 0.4rem 0.6rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .stop-name {
      font-size: 12px; font-weight: 600; color: #ff9500;
      text-transform: uppercase; letter-spacing: 0.08em;
      font-family: var(--mono); text-decoration: none;
    }
    .stop-name:hover { text-decoration: underline; }
    .stop-meta { font-size: 10px; font-family: var(--mono); color: #555; }
    .dep-row {
      padding: 0.18rem 0.6rem;
      display: grid; grid-template-columns: 38px 1fr auto;
      gap: 0 8px; align-items: center;
      border-bottom: 1px solid #1a1a1a;
    }
    .dep-row:last-child { border-bottom: none; }
    .line-badge {
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      border-radius: 4px; padding: 0.15rem 0.3rem;
      text-align: center; white-space: nowrap;
    }
    .dep-direction { font-size: 12px; font-weight: 500; color: #e8e8e8; font-family: var(--mono); }
    .dep-time { text-align: right; }
    .dep-plan { font-family: var(--mono); font-size: 12px; font-weight: 500; color: #e8e8e8; }
    .dep-delay { font-family: var(--mono); font-size: 10px; color: #e53935; margin-top: 1px; }
    .dep-soon { font-family: var(--mono); font-size: 12px; color: #e53935; font-weight: 700; }
    .dep-warn { font-family: var(--mono); font-size: 12px; color: #ff9500; font-weight: 700; }
    .dep-ok   { font-family: var(--mono); font-size: 12px; color: #43a047; }
    .empty-stop { font-size: 11px; color: #444; font-family: var(--mono); padding: 0.5rem 0.6rem; }
    .empty { text-align: center; padding: 3rem 1rem; color: #444; font-size: 13px; font-family: var(--mono); }
    .err   { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3); border-radius: 8px; padding: 1rem; font-size: 13px; color: #e57373; margin-top: 1rem; font-family: var(--mono); }
    .updated { font-size: 10px; font-family: var(--mono); color: #444; text-align: center; margin-top: 0.75rem; }
    #spinner { text-align: center; padding: 3rem 1rem; color: #444; font-family: var(--mono); font-size: 13px; }
    .search-box {
      background: var(--surface); border: 1px solid var(--border2); border-radius: 12px;
      padding: 1rem; margin: 1.5rem 0 0;
      display: flex; gap: 8px; align-items: center; position: relative;
    }
    .search-box input {
      flex: 1; border: 1px solid var(--border2); border-radius: 8px;
      padding: 0.5rem 0.75rem; font-family: var(--sans); font-size: 14px;
      background: var(--bg); color: var(--text); outline: none;
    }
    .search-box input:focus { border-color: var(--tgzm); }
    .search-results {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
      background: var(--surface); border: 1px solid var(--border2); border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1); max-height: 260px; overflow-y: auto;
      margin-top: 4px;
    }
    .search-result {
      padding: 0.65rem 1rem; cursor: pointer; font-size: 13px;
      border-bottom: 0.5px solid var(--border);
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: var(--bg); }
    .search-result { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .sr-name { flex: 1; color: var(--text); text-decoration: none; }
    .sr-name:hover { text-decoration: underline; }
    .sr-stops { display: flex; gap: 4px; flex-shrink: 0; }
    .st-link {
      background: var(--tgzm); color: var(--tgzm-dark); border-radius: 5px;
      padding: 2px 7px; font-size: 11px; font-family: var(--mono);
      text-decoration: none; font-weight: 500; white-space: nowrap;
    }
    .st-link:hover { opacity: 0.8; }
  </style>
</head>

  function searchStop(q) {
    const results = document.getElementById('searchResults');
    if (q.length < 2) { results.style.display = 'none'; return; }
    const matches = ALL_STOPS.filter(s => s.name.toLowerCase().includes(q.toLowerCase())).slice(0, 10);
    if (!matches.length) { results.style.display = 'none'; return; }
    results.innerHTML = matches.map(s => {
      const groupUrl = 'https://sdip.transportgzm.pl/main';
      const stopsHtml = s.stops.map(st =>
        '<a href="https://rj.transportgzm.pl/api/-/sdip/table/' + st.id + '/v2/" target="_blank" class="st-link" onclick="event.stopPropagation()">st. ' + st.st + '</a>'
      ).join('');
      return '<div class="search-result"><a class="sr-name" href="' + groupUrl + '" target="_blank">' + s.name + '</a><span class="sr-stops">' + stopsHtml + '</span></div>';
    }).join('');
    results.style.display = 'block';
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-box')) {
      document.getElementById('searchResults').style.display = 'none';
    }
  });

    function lineBadgeStyle(line) {
    // Kolory dla konkretnych linii
    const colors = {
      '3':   ['#e53935','#fff'],
      '64':  ['#1e88e5','#fff'],
      '78':  ['#43a047','#fff'],
      '112': ['#8e24aa','#fff'],
      '129': ['#f57c00','#fff'],
      '180': ['#00897b','#fff'],
      '614': ['#c62828','#fff'],
      '615': ['#6a1b9a','#fff'],
      '712': ['#2e7d32','#fff'],
      '744': ['#1565c0','#fff'],
      '780': ['#558b2f','#fff'],
    };
    if (colors[line]) {
      return 'background:' + colors[line][0] + ';color:' + colors[line][1];
    }
    // Dla pozostałych linii — kolor z hash numeru
    let hash = 0;
    for (let i = 0; i < line.length; i++) hash = line.charCodeAt(i) + ((hash << 5) - hash);
    const hue = Math.abs(hash) % 360;
    return 'background:hsl(' + hue + ',65%,42%);color:#fff';
  }

  async function load() {
    const btn = document.getElementById('rbtn');
    btn.classList.add('loading');
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('content').innerHTML = '';
    document.getElementById('upd').textContent = '';

    try {
      const res = await fetch('/api?action=tgzm');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      document.getElementById('spinner').style.display = 'none';
      const content = document.getElementById('content');

      const grid = document.createElement('div');
      grid.className = 'boards-grid';
      content.appendChild(grid);
      GROUP_ORDER.forEach(groupId => {
        const group = (data.groups || {})[groupId];
        if (!group) return;
        const deps = group.deps || [];
        const block = document.createElement('div');
        block.className = 'stop-block';
        block.innerHTML = `
          <div class="stop-header">
            <span class="stop-name">${group.name}</span>
            <div class="stop-meta">rozkład</div>
          </div>`;

        if (!deps.length) {
          block.innerHTML += `<div class="empty-stop">🟢 Brak nadchodzących odjazdów</div>`;
        } else {
          deps.forEach(d => {
            const row = document.createElement('div');
            row.className = 'dep-row';
            const diffStr = d.diffMin <= 0 ? 'już!' : d.diffMin + ' min';
            const diffCls = d.diffMin <= 2 ? 'dep-soon' : d.diffMin <= 5 ? 'dep-warn' : 'dep-ok';
            row.innerHTML = `
              <div class="line-badge" style="${lineBadgeStyle(d.line)}">${d.line}</div>
              <div class="dep-direction">${d.headsign}</div>
              <div class="dep-time">
                <div class="dep-plan">${d.planned}</div>
                <div class="${diffCls}">${diffStr}</div>
              </div>`;
            block.appendChild(row);
          });
        }
        grid.appendChild(block);
      });

      document.getElementById('upd').textContent =
        'ostatnia aktualizacja: ' + new Date().toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
        + (data.updated ? ' · dane GTFS-RT: ' + data.updated : '');

    } catch(e) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('content').innerHTML = `<div class="err">Błąd: ${e.message}</div>`;
    }

    btn.classList.remove('loading');
  }

  load();
  setInterval(load, 30000);
</script>

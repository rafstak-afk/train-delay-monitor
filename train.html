<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Przebieg pociągu</title>
<style>
:root{--bg:#101820;--panel:#1c2833;--line:#34495e;--blue:#0b57d0;--cyan:#0dcaf0;--green:#198754;--text:#fff;--muted:#b8c2cc}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:24px}.wrap{max-width:920px;margin:0 auto}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.back{background:#243447;color:#fff;text-decoration:none;border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-weight:700}h1{font-size:28px;margin:0;text-align:center;flex:1}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin:14px 0}.form{display:flex;gap:10px;flex-wrap:wrap}.form input{flex:1;min-width:180px;border:0;border-radius:10px;padding:14px;font-size:18px}.form button,.btn{border:0;border-radius:10px;padding:14px 18px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.primary{background:var(--cyan);color:#102027}.green{background:var(--green);color:white}.blue{background:var(--blue);color:white}.muted{color:var(--muted);line-height:1.45}.status{margin-top:14px;color:var(--muted)}.big-number{font-size:42px;font-weight:900;letter-spacing:.02em}.hint{font-size:14px;color:var(--muted);margin-top:8px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.debug{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;white-space:pre-wrap;background:#0b1118;border:1px solid #263647;border-radius:12px;padding:12px;color:#dbeafe;display:none}.warn{border-left:4px solid #fbbf24;padding-left:12px;color:#fde68a}.err{border-left:4px solid #ef4444;padding-left:12px;color:#fecaca}@media(max-width:700px){body{padding:12px}.top{align-items:flex-start}.back{padding:9px 11px}h1{font-size:22px;text-align:left}.card{padding:14px}.form{flex-direction:column}.form input,.form button,.btn{width:100%;font-size:16px}.big-number{font-size:36px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="/">← Tablica</a>
    <h1>🚆 Przebieg pociągu</h1>
  </div>

  <div class="card">
    <div class="form">
      <input id="trainInput" inputmode="numeric" placeholder="Wpisz numer pociągu, np. 3814" />
      <button class="primary" onclick="searchTrain()">Pokaż</button>
    </div>
    <div id="status" class="status">Wpisz numer pociągu albo kliknij numer na tablicy odjazdów.</div>
  </div>

  <div id="result" class="card" style="display:none"></div>
  <div id="debug" class="debug"></div>
</div>
<script>
function qs(name){return new URLSearchParams(location.search).get(name)||''}
function cleanTrainNumber(v){const m=String(v||'').match(/\d{2,6}/);return m?m[0]:''}
function escapeHtml(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function setStatus(t){document.getElementById('status').textContent=t}
function portalSearchUrl(train){
  // Bezpieczny fallback: oficjalny moduł „Znajdź pociąg”. Parametry PLK są sesyjne, więc nie udajemy, że mamy stały SID.
  return 'https://portalpasazera.pl/';
}
async function searchTrain(){
  const input=document.getElementById('trainInput');
  const train=cleanTrainNumber(input.value);
  input.blur();
  if(!train){setStatus('Wpisz numer pociągu.');return}
  input.value=train;
  setStatus('Szukam pociągu '+train+'...');
  const result=document.getElementById('result');
  result.style.display='block';
  result.innerHTML=`<div class="big-number">${escapeHtml(train)}</div><div class="hint">Próbuję pobrać dane z lokalnego backendu. Jeżeli PLK wymaga sesyjnego SID, użyj przycisku do Portalu Pasażera.</div>`;

  let got=false;
  const endpoints=[
    '/api?action=train&train='+encodeURIComponent(train),
    '/api/train?train='+encodeURIComponent(train),
    '/api/debug-train?train='+encodeURIComponent(train),
    '/api/debug-train?number='+encodeURIComponent(train)
  ];
  for(const url of endpoints){
    try{
      const r=await fetch(url,{headers:{Accept:'application/json'}});
      if(!r.ok) continue;
      const data=await r.json();
      if(data && !data.error){
        got=true;
        renderBackendData(train,data,url);
        break;
      }
    }catch(e){}
  }
  if(!got){
    renderFallback(train);
  }
}
function renderBackendData(train,data,source){
  const result=document.getElementById('result');
  const route=data.route||data.train||data;
  const name=route.name||data.name||'';
  const rel=[route.from||data.from||data.origin,route.to||data.to||data.destination].filter(Boolean).join(' → ');
  const stations=(route.stations||data.stations||data.operation?.stations||[]);
  let list='';
  if(Array.isArray(stations)&&stations.length){
    list='<h3>Stacje</h3>'+stations.slice(0,80).map((s,i)=>{
      const st=s.name||s.stationName||s.stationId||('stacja '+(i+1));
      const t=s.actualDeparture||s.plannedDeparture||s.departureTime||s.arrivalTime||'';
      const ok=s.isConfirmed?'✓':'•';
      return `<div class="muted">${ok} ${escapeHtml(st)} ${t?(' · '+escapeHtml(String(t).slice(11,16)||String(t))):''}</div>`;
    }).join('');
  }
  result.innerHTML=`
    <div class="big-number">${escapeHtml(train)}</div>
    ${name?`<h2>${escapeHtml(name)}</h2>`:''}
    ${rel?`<p class="muted">${escapeHtml(rel)}</p>`:''}
    <p class="muted">Źródło: ${escapeHtml(source)}</p>
    ${list||'<p class="warn">Backend odpowiedział, ale bez czytelnej listy stacji.</p>'}
    <div class="actions"><a class="btn green" target="_blank" rel="noopener" href="${portalSearchUrl(train)}">Otwórz w Portal Pasażera</a></div>
  `;
  setStatus('Gotowe. Dane pobrane z backendu.');
}
function renderFallback(train){
  const result=document.getElementById('result');
  result.innerHTML=`
    <div class="big-number">${escapeHtml(train)}</div>
    <p class="warn">Nie mam jeszcze stabilnego lokalnego endpointu do szczegółów tego pociągu. Z F12 wiemy, że Portal Pasażera używa strony <b>SzczegolyPolaczenia?sid=...</b> oraz POST <b>PobierzInformacje</b>, ale SID jest sesyjny.</p>
    <p class="muted">Na tym etapie ta podstrona jest bezpiecznym przejściem z tablicy do wyszukania pociągu. Nie prowadzi już do tablicy stacyjnej.</p>
    <div class="actions">
      <button class="btn blue" onclick="navigator.clipboard?.writeText('${escapeHtml(train)}');setStatus('Skopiowano numer pociągu ${escapeHtml(train)}.')">Kopiuj numer</button>
      <a class="btn green" target="_blank" rel="noopener" href="${portalSearchUrl(train)}">Otwórz Portal Pasażera</a>
    </div>
  `;
  setStatus('Nie udało się pobrać szczegółów lokalnie. Numer jest gotowy do użycia w Portal Pasażera.');
}
document.getElementById('trainInput').addEventListener('keydown',e=>{if(e.key==='Enter')searchTrain()});
window.addEventListener('DOMContentLoaded',()=>{const train=cleanTrainNumber(qs('train')||qs('number')||qs('nr'));if(train){document.getElementById('trainInput').value=train;searchTrain();}});
</script>
</body>
</html>

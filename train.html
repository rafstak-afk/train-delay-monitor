<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bieg pociągu</title>
<style>
:root{--bg:#101820;--panel:#1c2833;--card:#223244;--border:#34495e;--text:#fff;--muted:#b8c3cf;--green:#5dd39e;--yellow:#ffcc00;--red:#ff4d4d;--violet:#c084fc;--blue:#0b57d0;--grey:#4b5563}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:22px}.wrap{max-width:980px;margin:0 auto}.top{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}h1{margin:0;font-size:30px}.back{background:var(--grey);color:#fff;text-decoration:none;border-radius:10px;padding:11px 16px;font-weight:800}.panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;margin:14px 0}.search{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.search input{min-width:240px;border:0;border-radius:10px;padding:13px;font-size:18px}.btn{border:0;border-radius:10px;padding:13px 17px;background:var(--blue);color:#fff;font-weight:800;cursor:pointer}.btn2{display:inline-block;border-radius:10px;padding:12px 16px;background:#198754;color:#fff;text-decoration:none;font-weight:800;margin-top:12px}.btn3{display:inline-block;border:0;border-radius:10px;padding:8px 10px;background:var(--grey);color:#fff;text-decoration:none;font-weight:800;margin-left:8px}.muted{opacity:.76}.err{background:#3b1d1d;border:1px solid #dc3545;color:#ffd6d6;border-radius:10px;padding:12px;margin-top:12px}.ok{color:var(--green);font-weight:800}.warn{color:var(--yellow);font-weight:800}.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:10px}.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}.card .label{font-size:14px;color:var(--muted);margin-bottom:4px}.card .value{font-size:22px;font-weight:900}.route{margin-top:12px}.section-title{font-size:24px;margin:0 0 12px}.station{display:grid;grid-template-columns:110px 1fr 170px 110px;gap:12px;padding:12px 4px;border-bottom:1px solid rgba(255,255,255,.12);align-items:center}.station:last-child{border-bottom:0}.station.passed{opacity:.72}.station.current{background:#263b52;border-radius:10px;opacity:1;padding-left:10px;padding-right:10px}.station.next{background:rgba(255,204,0,.08);border-radius:10px;padding-left:10px;padding-right:10px}.badge{font-size:12px;border-radius:999px;padding:4px 9px;background:var(--grey);display:inline-block;font-weight:900;text-align:center}.badge.passed{background:#198754}.badge.current{background:var(--yellow);color:#102027}.badge.next{background:#0dcaf0;color:#102027}.badge.plan{background:#334155;color:#cbd5e1}.station-name{font-size:18px;font-weight:900}.station-id{font-size:12px;color:var(--muted);margin-top:2px}.small{font-size:12px;color:var(--muted)}.timebox{text-align:left}.time-one{font-size:18px;font-weight:900;color:var(--green)}.time-real{font-size:19px;font-weight:900}.time-plan{font-size:13px;color:var(--muted);margin-bottom:2px}.delay-low{color:var(--yellow)}.delay-mid{color:var(--red)}.delay-high{color:var(--violet)}.platform{font-size:17px;font-weight:800}.status-help{font-size:13px;color:var(--muted);line-height:1.35;margin-top:5px}@media(max-width:720px){body{padding:10px}h1{font-size:24px}.top{justify-content:flex-start}.search input,.btn,.back{width:100%;text-align:center}.station{grid-template-columns:82px 1fr;gap:8px}.station .timebox,.station .platform-wrap{grid-column:2}.station-name{font-size:16px}.panel{padding:12px}.card .value{font-size:19px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>🚆 Bieg pociągu</h1></div>
  <div class="search">
    <input id="trainInput" placeholder="Wpisz numer pociągu..." inputmode="numeric" />
    <button class="btn" onclick="loadTrain()">Pokaż</button>
    <a class="back" href="/">← Tablica</a>
  </div>
  <div id="status" class="muted" style="text-align:center;margin:14px 0">Kliknij numer pociągu na tablicy albo wpisz numer ręcznie.</div>
  <div id="result"></div>
</div>
<script>
function qs(name){return new URLSearchParams(location.search).get(name)||''}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function short(v){if(!v)return'';const m=String(v).match(/(\d{2}:\d{2})/);return m?m[1]:String(v)}
function setStatus(t){document.getElementById('status').textContent=t}
function portalUrl(n){return 'https://portalpasazera.pl/';}
function copyText(text){navigator.clipboard?.writeText(text).then(()=>setStatus('Skopiowano do schowka.')).catch(()=>setStatus('Nie udało się skopiować.'))}
const STATUS_MAP={P:['Kurs aktywny / w realizacji','Kod PLK: P. Pociąg jest w biegu albo w bieżącej obsłudze systemu. To nie jest komunikat pasażerski, więc tłumaczymy go po ludzku.'],C:['Odwołany','Kod PLK: C. Kurs odwołany.'],X:['Odwołany','Kod PLK: X. Kurs odwołany.'],S:['Rozkładowy','Kod PLK: S. Dane bez potwierdzenia bieżącej realizacji.'],R:['W ruchu','Kod PLK: R. Pociąg w ruchu.'],Z:['Zakończony','Kod PLK: Z. Bieg zakończony.']};
const STATION_NAMES={
  '73312':'Katowice','71001':'Tarnowskie Góry','73106':'Chorzów Batory','62653':'Częstochowa','63552':'Lubliniec','69708':'Kalety',
  '72272':'Katowice Zawodzie','72306':'Sosnowiec Główny','71068':'Miasteczko Śląskie','71050':'Kalety','71043':'Koszęcin'
};
function addQueryStationName(map){const sid=qs('stationId'), sname=qs('station');if(sid&&sname)map[String(sid)]=sname.replaceAll('+',' ')}
function makeStationNameMap(data){const map={...STATION_NAMES};addQueryStationName(map);const sources=[data.stationNames,data.stations,data.dictionaries?.stations,data.route?.stationNames,data.operation?.stationNames];for(const src of sources){if(!src)continue;for(const [k,v] of Object.entries(src)){map[String(k)]=typeof v==='string'?v:(v?.name||v?.stationName||v?.shortName||'')}}const all=[...(data.route?.stations||[]),...(data.operation?.stations||[])];for(const s of all){const id=s.stationId||s.stopId;if(!id)continue;const n=s.stationName||s.name||s.stopName||s.station;if(n)map[String(id)]=n}return map}
function stationLabel(s,map){const id=String(s.stationId||s.stopId||'');const n=s.stationName||s.name||s.stopName||s.station||map[id];return n?`${n} · ID ${id}`:`stacja ID ${id}`}
function stationTitle(s,map){const id=String(s.stationId||s.stopId||'');return s.stationName||s.name||s.stopName||s.station||map[id]||`stacja ID ${id}`}
function getOperationStations(data){return (data.operation&&Array.isArray(data.operation.stations))?data.operation.stations:[]}
function getRouteStations(data){return (data.route&&Array.isArray(data.route.stations))?data.route.stations:[]}
function seqOf(s,i){return Number(s.orderNumber||s.plannedSequenceNumber||s.actualSequenceNumber||i+1)}
function timeToMin(t){const m=short(t).match(/^(\d{2}):(\d{2})$/);return m?Number(m[1])*60+Number(m[2]):null}
function nowMinWarsaw(){const parts=new Date().toLocaleTimeString('pl-PL',{timeZone:'Europe/Warsaw',hour12:false,hour:'2-digit',minute:'2-digit'}).split(':').map(Number);return parts[0]*60+parts[1]}
function getPlanned(o,s){return o.plannedDepartureTime||o.plannedArrivalTime||o.plannedDeparture||o.plannedArrival||s.departureTime||s.arrivalTime||''}
function getActual(o){return o.actualDepartureTime||o.actualArrivalTime||o.actualDeparture||o.actualArrival||''}
function delayMinutes(planned,actual){const p=timeToMin(planned),a=timeToMin(actual);if(p==null||a==null)return 0;return a-p}
function delayClass(d){return d>=20?'delay-high':d>10?'delay-mid':d>0?'delay-low':''}
function renderTime(planned,actual){const p=short(planned),a=short(actual);if(!a||a===p){return `<div class="time-one">${esc(p||a||'')}</div>`}const d=Math.max(0,delayMinutes(p,a));return `<div class="time-plan">plan ${esc(p)}</div><div class="time-real ${delayClass(d)}">real ${esc(a)}</div>`}
function findLastConfirmed(ops){let last=null;for(const s of ops){if(s.isConfirmed===true)last=s}return last}
function render(data, trainNo){
  const result=document.getElementById('result');const route=data.route||{};const op=data.operation||{};const map=makeStationNameMap(data);
  const routeStations=getRouteStations(data);const ops=getOperationStations(data);const lastConfirmed=findLastConfirmed(ops);
  const title=[route.commercialCategorySymbol||qs('category'),route.nationalNumber||trainNo,route.name||qs('name')].filter(Boolean).join(' ');
  const status=STATUS_MAP[op.trainStatus]||[op.trainStatus?`Kod statusu: ${op.trainStatus}`:'brak danych','Nie mamy słownika dla tego kodu z API.'];
  let lastName='brak potwierdzonej stacji';let lastTime='';if(lastConfirmed){lastName=stationLabel(lastConfirmed,map);lastTime=short(lastConfirmed.actualDeparture||lastConfirmed.actualArrival||lastConfirmed.plannedDeparture||lastConfirmed.plannedArrival)}
  let html=`<div class="panel"><div class="meta"><div class="card"><div class="label">Pociąg</div><div class="value">${esc(title||('Pociąg '+trainNo))}</div><div class="status-help">Status: ${esc(status[0])}<br>${esc(status[1])}</div></div><div class="card"><div class="label">Ostatnia potwierdzona stacja</div><div class="value">${esc(lastName)}</div><div class="status-help">${esc(lastTime)}</div></div></div><a class="btn2" href="${esc(portalUrl(trainNo))}" target="_blank" rel="noopener">Otwórz Portal Pasażera</a><button class="btn3" onclick="copyText(summaryText)">Kopiuj podsumowanie</button></div>`;
  window.summaryText=`${title||('Pociąg '+trainNo)}\nStatus: ${status[0]}\nOstatnia potwierdzona stacja: ${lastName}${lastTime?' '+lastTime:''}`;
  if(!routeStations.length&&!ops.length){html+=`<div class="panel"><div class="err">Nie udało się pobrać przebiegu z lokalnego API. Użyj przycisku Portal Pasażera.</div></div>`;result.innerHTML=html;return}
  const opBySeq={};ops.forEach((s,i)=>{const seq=seqOf(s,i);opBySeq[seq]=s});const lastSeq=lastConfirmed?seqOf(lastConfirmed,0):null;
  const all=(routeStations.length?routeStations:ops).map((s,i)=>({s,seq:seqOf(s,i)})).sort((a,b)=>a.seq-b.seq);
  const nMin=nowMinWarsaw();let firstFutureSeq=null;for(const row of all){const o=opBySeq[row.seq]||ops.find(x=>String(x.stationId)===String(row.s.stationId))||{};const p=getPlanned(o,row.s);const pm=timeToMin(p);if(pm!=null&&pm>=nMin&&firstFutureSeq==null)firstFutureSeq=row.seq}
  const rows=all.map(({s,seq})=>{const o=opBySeq[seq]||ops.find(x=>String(x.stationId)===String(s.stationId))||{};const planned=getPlanned(o,s);const actual=getActual(o);let state='plan';let badge='plan';let text='plan';
    if(lastSeq!==null){if(seq<lastSeq){state='passed';badge='passed';text='zaliczona'}else if(seq===lastSeq){state='current';badge='current';text='ostatnia'}else if(seq===lastSeq+1){state='next';badge='next';text='następna'}else{text='przed'}}
    else if(firstFutureSeq!==null){if(seq===firstFutureSeq){state='next';badge='next';text='następna'}else if(seq<firstFutureSeq){state='plan';badge='plan';text='wg planu minęła'}else{text='przed'}}
    const platform=[s.departurePlatform||s.arrivalPlatform||'',s.departureTrack||s.arrivalTrack||''].filter(Boolean).join(' / ');
    return `<div class="station ${state}"><div><span class="badge ${badge}">${esc(text)}</span></div><div><div class="station-name">${esc(stationTitle(s,map))}</div><div class="station-id">ID ${esc(s.stationId||s.stopId||'')} · kolejność: ${esc(seq)}</div></div><div class="timebox">${renderTime(planned,actual)}</div><div class="platform-wrap"><div class="small">peron / tor</div><div class="platform">${esc(platform||'—')}</div></div></div>`}).join('');
  html+=`<div class="panel"><h2 class="section-title">Trasa stacja po stacji</h2><div class="route">${rows}</div></div>`;result.innerHTML=html}
async function loadTrain(){const n=document.getElementById('trainInput').value.trim();if(!n){setStatus('Wpisz numer pociągu.');return}setStatus('Pobieram bieg pociągu '+n+'...');document.getElementById('trainInput').blur();const p=new URLSearchParams();const date=qs('date'),scheduleId=qs('scheduleId'),orderId=qs('orderId'),trainOrderId=qs('trainOrderId');if(date)p.set('date',date);if(scheduleId)p.set('scheduleId',scheduleId);if(orderId)p.set('orderId',orderId);if(trainOrderId)p.set('trainOrderId',trainOrderId);try{if(!scheduleId||!orderId||!trainOrderId)throw new Error('Brak identyfikatorów kursu z tablicy. Kliknij numer pociągu na głównej tablicy.');const r=await fetch('/api/debug-train?'+p.toString(),{headers:{Accept:'application/json'}});const data=await r.json();if(!r.ok)throw new Error(data.error||data.details||('HTTP '+r.status));render(data,n);setStatus('Gotowe.')}catch(e){document.getElementById('result').innerHTML=`<div class="panel"><h2>Pociąg ${esc(n)}</h2><div class="err">${esc(e.message)}</div><a class="btn2" href="${esc(portalUrl(n))}" target="_blank" rel="noopener">Otwórz w Portal Pasażera</a></div>`;setStatus('Nie udało się pobrać pełnego biegu lokalnie.')}}
document.addEventListener('DOMContentLoaded',()=>{const n=qs('train');if(n){trainInput.value=n;loadTrain()}});
</script>
</body>
</html>
